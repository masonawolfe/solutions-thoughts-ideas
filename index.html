  'us-immigration': {
    title:'US Immigration', isWedge:true, intensity:'high', region:'United States', sensitivity:'This topic directly affects millions of families and individuals. All perspectives are presented with respect for human dignity.', lastVerified:'March 2026',
    sources:[
      {id:1,text:'US Immigration Policy: Border enforcement, asylum, and legal pathways',org:'Migration Policy Institute',url:'https://www.migrationpolicy.org/',date:'2024'},
      {id:2,text:'Immigration Court Backlog and Asylum Processing',org:'AP News',url:'https://apnews.com/',date:'2024'},
      {id:3,text:'Americans\' views on immigration and border security',org:'Pew Research Center',url:'https://www.pewresearch.org/topics/immigration/',date:'2024'},
      {id:4,text:'Border encounters and migrant crisis statistics',org:'Reuters',url:'https://www.reuters.com/world/us/',date:'2024'},
      {id:5,text:'Immigration Law and Refugee Policy',org:'National Immigration Forum',url:'https://immigrationforum.org/',date:'2024'},
      {id:6,text:'Refugee resettlement and humanitarian obligations',org:'International Rescue Committee',url:'https://www.rescue.org/',date:'2024'},
      {id:7,text:'Economic impacts of immigration on labor markets',org:'Council on Foreign Relations',url:'https://www.cfr.org/',date:'2024'},
      {id:8,text:'Legal immigration processes and visa reform',org:'USCIS',url:'https://www.uscis.gov/',date:'2024'}
    ],
    keyDates:[
      {date:'1965',event:'Immigration and Nationality Act eliminates national-origin quotas'},
      {date:'1986',event:'Reagan signs Immigration Reform and Control Act (amnesty for ~3 million)'},
      {date:'2001',event:'Post-9/11 security overhaul reshapes immigration enforcement'},
      {date:'2012',event:'Obama creates DACA program for childhood arrivals'},
      {date:'2017-21',event:'Trump administration restricts asylum, builds border wall'},
      {date:'2023-24',event:'Record border encounters; bipartisan reform bill collapses'},
    ],
    situation:"Immigration has been one of the most contentious issues in American politics for decades, but tensions have reached a particularly acute level. Record numbers of migrants have arrived at the US-Mexico border, straining resources and creating humanitarian challenges in border communities and destination cities alike.\nThe US immigration system is widely acknowledged to be broken. A backlog of millions of asylum cases clogs the courts, visa processing delays stretch for years or decades, and millions of undocumented immigrants live and work in the country without legal status. Multiple attempts at comprehensive reform have failed in Congress.\nThe debate touches on fundamental questions about American identity: who gets to become an American, what obligations the nation has to those fleeing persecution and poverty, and how to balance economic needs with security concerns and rule of law.",
    sides:[
      {name:'Restrictionist position',coreBeliefs:'Secure borders are essential for national sovereignty. Illegal immigration undermines the rule of law and is unfair to legal immigrants. Mass immigration depresses wages for American workers.',keyFigures:'Various Republican legislators, border enforcement groups, some labor organizations',c:'sc1'},
      {name:'Pro-immigration position',coreBeliefs:'Immigration is a core American value and economic strength. Immigrants contribute more than they cost. The asylum system must be honored under international law. A path to citizenship for undocumented residents is practical and humane.',keyFigures:'Various Democratic legislators, immigration advocacy organizations, business coalitions, faith communities',c:'sc2'},
      {name:'Comprehensive reform advocates',coreBeliefs:'The system needs complete overhaul addressing border security, legal pathways, and undocumented residents simultaneously. Piecemeal approaches have failed. Both enforcement and compassion are necessary.',keyFigures:'Bipartisan policy groups, some business leaders, pragmatic legislators',c:'sc3'}
    ],
    importantDistinction:'Being concerned about border security does not necessarily make someone anti-immigrant, and supporting immigrant rights does not mean supporting open borders. Most Americans hold views combining elements of both positions.',
    missingVoices:'Immigrants themselves (particularly undocumented individuals who fear speaking publicly), border community residents, legal immigrants frustrated by lengthy processes, employers dependent on immigrant labor, and children of mixed-status families.',
    powerBrokers:[
      {name:'US Congress',description:'Has failed to pass comprehensive reform for decades. The impasse forces presidents to rely on executive actions that create legal uncertainty.'},
      {name:'Federal courts',description:'Immigration policy is heavily litigated. Courts have blocked initiatives from both parties, creating a constantly shifting landscape.'},
      {name:'Origin country governments',description:'Migration is deeply influenced by conditions in origin countries. These governments are both partners and sources of friction.'},
      {name:'Employers and industry',description:'Agriculture, construction, hospitality, and tech rely heavily on immigrant labor and lobby for expanded legal immigration.'}
    ],
    gameTheory:"Immigration policy is trapped in a legislative prisoner's dilemma. Both parties benefit electorally from keeping immigration unresolved to motivate their bases, reducing incentives for compromise. Any bipartisan deal risks alienating core supporters.\nThe humanitarian dimension creates additional complexity: enforcement-only approaches face practical and moral limits, while permissive approaches can create pull factors. Finding the equilibrium between deterrence and compassion is the central challenge.",
    keyLeaders:[
      {name:'US President',role:'Sets executive enforcement priorities',stake:'Immigration enforcement is among the most visible and politically consequential executive powers. Presidents face pressure from all sides.'},
      {name:'Border state governors',role:'Governors of Texas, Arizona, California, etc.',stake:'Bear the most immediate operational and fiscal impact. Have taken unilateral actions like busing migrants to other states.'},
      {name:'James Lankford / bipartisan negotiators',role:'US Senators leading reform efforts',stake:'Represent the political center attempting compromise. Their failure illustrates the difficulty of bridging partisan divides.'},
      {name:'Mexican President',role:'Head of state of primary transit country',stake:'Manages the complex relationship between migration enforcement cooperation and Mexican sovereignty concerns.'},
    ],
    resolutionPaths:[
      {title:'Comprehensive legislative reform',description:'A grand bargain combining enhanced border security, expanded legal pathways, modernized visa systems, and a pathway to legal status for long-term undocumented residents.'},
      {title:'Bilateral development partnerships',description:'Massive investment in economic development and security in Central America and Mexico to address root causes of migration.'},
      {title:'Immigration court and asylum reform',description:'Dramatically expanding courts, creating clearer asylum standards, and establishing expedited processes that are both fair and timely.'},
      {title:'Labor market-based system',description:'Adjusting immigration levels based on labor market needs, with portable work visas and clear pathways from temporary to permanent status.'}
    ],
    historicalPrecedent:'The Immigration Reform and Control Act of 1986 provided amnesty for nearly 3 million people while increasing enforcement. It is viewed as a partial success that failed to solve the underlying problem because enforcement was not adequately implemented and legal pathways were not sufficiently expanded.'
 ,
    quickTake:"America's immigration system is broken by nearly everyone's admission. Record border arrivals meet a court backlog of millions. The debate is really about who gets to be American \u2014 and what that means.",
    pullQuote:"Both parties benefit electorally from keeping immigration unresolved to motivate their bases, reducing incentives for compromise.",
    didYouKnow:"The US immigration court backlog exceeded 3 million cases in 2024 \u2014 some people wait over a decade for a hearing.",
    discussionGuide:{
      ageNote:"Recommended for ages 14+",
      starters:["What makes someone 'American' — citizenship, values, time, something else?","Why do you think people leave their home countries? What would make you leave yours?","If someone is here without permission but contributing, should they be able to stay?"],
      values:"What tensions exist here — rule of law vs. compassion, sovereignty vs. humanitarian obligation, economic benefit vs. cultural concerns? How do you weigh these?",
      redFlags:"Watch for: dehumanizing language, assuming all immigrants are the same, treating any criticism as xenophobia or any caution as cruelty. Both things can be true — borders are real and so is human suffering.",
      activity:"Interview someone who immigrated. Ask what the process was like, what they gained, what they lost. Then talk with someone who's skeptical of immigration. Try to understand what actually drives each position beyond stereotypes."
    },
    organizations:[{"name": "National Immigration Forum", "what": "Advocates for immigration policy that addresses security, economic, and humanitarian concerns. Bipartisan approach.", "tag": "Policy", "url": "https://immigrationforum.org"}, {"name": "International Rescue Committee", "what": "Helps refugees and asylum seekers resettle and rebuild their lives in the US.", "tag": "Resettlement", "url": "https://www.rescue.org"}, {"name": "CLINIC", "what": "Catholic Legal Immigration Network. Provides legal services to immigrants regardless of religion.", "tag": "Legal Aid", "url": "https://cliniclegal.org"}],
    actions:[{"icon": "\ud83d\udcd6", "title": "Understand deeper", "desc": "Cut through the noise with nonpartisan data.", "links": [{"text": "Migration Policy Institute", "url": "https://www.migrationpolicy.org"}, {"text": "Pew Research immigration data", "url": "https://www.pewresearch.org"}]}, {"icon": "\ud83e\udd1d", "title": "Support immigrants locally", "desc": "Volunteer or donate to local resettlement.", "links": [{"text": "Find local IRC offices", "url": "https://www.rescue.org/united-states"}, {"text": "Volunteer with CLINIC", "url": "https://cliniclegal.org"}]}, {"icon": "\ud83d\uddf3\ufe0f", "title": "Engage your representatives", "desc": "Immigration reform requires constituent pressure.", "links": [{"text": "Find your representatives", "url": "https://www.congress.gov/members/find-your-member"}, {"text": "National Immigration Forum advocacy", "url": "https://immigrationforum.org"}]}, {"icon": "\ud83d\udce2", "title": "Have real conversations", "desc": "Talk across divides about immigration.", "links": [{"text": "Braver Angels depolarization", "url": "https://braverangels.org"}, {"text": "Share this analysis", "url": "#"}]}] },

  'climate': {
    title:'Climate Policy', isWedge:false, intensity:'medium', region:'Global', sensitivity:null, lastVerified:'March 2026',
    sources:[
      {id:1,text:'Climate Science: Global warming causes, impacts, and evidence',org:'NASA Climate',url:'https://climate.nasa.gov/',date:'2024'},
      {id:2,text:'IPCC Climate Reports and scientific consensus',org:'Intergovernmental Panel on Climate Change',url:'https://www.ipcc.ch/',date:'2024'},
      {id:3,text:'Global climate policy and emissions tracking',org:'World Resources Institute',url:'https://www.wri.org/',date:'2024'},
      {id:4,text:'Carbon pricing and climate finance mechanisms',org:'Reuters',url:'https://www.reuters.com/',date:'2024'},
      {id:5,text:'US Climate Policy and clean energy investment',org:'Council on Foreign Relations',url:'https://www.cfr.org/',date:'2024'},
      {id:6,text:'COP negotiations and international climate agreements',org:'BBC News',url:'https://www.bbc.com/news/science_and_environment',date:'2024'},
      {id:7,text:'Renewable energy trends and transition costs',org:'International Energy Agency',url:'https://www.iea.org/',date:'2024'},
      {id:8,text:'Climate justice and equity concerns in transition',org:'AP News',url:'https://apnews.com/',date:'2024'}
    ],
    keyDates:[
      {date:'1988',event:'IPCC established; James Hansen testifies to Congress on global warming'},
      {date:'1997',event:'Kyoto Protocol adopted'},
      {date:'2015',event:'Paris Agreement sets goal of limiting warming to 1.5°C'},
      {date:'2022',event:'US Inflation Reduction Act commits $370B to clean energy'},
      {date:'2023',event:'Hottest year on record globally'},
      {date:'2024-25',event:'COP negotiations continue; global emissions still rising'},
    ],
    situation:"The scientific consensus on human-caused climate change is overwhelming, with global temperatures already approximately 1.1°C above pre-industrial levels. Effects are increasingly visible: heat waves, wildfires, hurricanes, flooding, and droughts.\nDespite decades of negotiations and the 2015 Paris Agreement, global greenhouse gas emissions continue to rise. Current commitments, even if fully implemented, project warming well above the 1.5°C target.\nThe debate has shifted from whether climate change is happening to how fast to act, who should bear costs, and how to balance emission reductions with economic development.",
    sides:[
      {name:'Rapid transition advocates',coreBeliefs:'The climate crisis is an existential emergency. Fossil fuel use must end quickly. Economic systems must be restructured around sustainability. Climate justice demands wealthy nations lead.',keyFigures:'Climate scientists, Extinction Rebellion, Fridays for Future, Green parties, small island states',c:'sc1'},
      {name:'Market and technology optimists',coreBeliefs:'Innovation and market forces are most effective. Carbon pricing, clean energy investment, and technologies like carbon capture can reduce emissions without sacrificing growth. Nuclear should be part of the solution.',keyFigures:'Economists, tech industry leaders, some centrist politicians, nuclear advocates',c:'sc2'},
      {name:'Gradual transition / Energy realists',coreBeliefs:'Rapid transition risks economic disruption and energy insecurity. Fossil fuels will remain necessary during transition. Energy affordability must be balanced against emissions goals.',keyFigures:'Fossil fuel industry, energy-producing nations, some developing country governments, worker unions',c:'sc3'},
      {name:'Climate skeptics / Policy opponents',coreBeliefs:'Costs of aggressive climate policies outweigh benefits. Climate models may overstate risks. Adaptation is more practical than prevention. Regulation harms competitiveness.',keyFigures:'Some conservative think tanks, fossil fuel lobbyists, politicians in energy-dependent regions',c:'sc4'}
    ],
    importantDistinction:'Questioning the pace or method of climate action is different from denying climate science. Many who accept the science have legitimate concerns about energy costs, jobs, and distributional impacts. Conflating these with denial shuts down productive dialogue.',
    missingVoices:'Developing-nation communities already experiencing impacts, fossil fuel workers facing displacement, indigenous communities with ecological knowledge, future generations, and small farmers in vulnerable regions.',
    powerBrokers:[
      {name:'China',description:'World\'s largest emitter and largest manufacturer of solar panels and batteries. Its trajectory on coal and renewables largely determines whether global targets are met.'},
      {name:'United States',description:'Historically the largest cumulative emitter. Policy oscillates between leadership and withdrawal depending on which party controls government.'},
      {name:'Fossil fuel industry',description:'Major companies wield enormous economic and political influence. Some invest in clean energy; others resist change.'},
      {name:'Financial institutions',description:'Banks and investors increasingly factor climate risk into decisions, potentially redirecting trillions from fossil fuels to clean energy.'}
    ],
    gameTheory:"Climate policy presents the classic tragedy of the commons. Each nation benefits from emissions while costs are shared globally, creating free-rider incentives. The Paris Agreement attempts to address this through mutual accountability.\nThere is also a first-mover dilemma: countries investing heavily in clean energy risk short-term disadvantage, but may gain long-term competitive advantages in the growing clean energy sector. This shifts the calculus from sacrifice to industrial opportunity.",
    keyLeaders:[
      {name:'Xi Jinping',role:'President of China',stake:'China\'s net-zero-by-2060 pledge is critical. Balancing emissions reduction with economic growth and energy security for 1.4 billion people.'},
      {name:'US President',role:'Leader of largest cumulative emitter',stake:'US climate policy swings dramatically between administrations, creating uncertainty for domestic industry and international agreements.'},
      {name:'Ursula von der Leyen',role:'President of the European Commission',stake:'Drives the EU Green Deal, the world\'s most ambitious climate legislative package. Balances green ambition with industrial competitiveness.'},
      {name:'Narendra Modi',role:'Prime Minister of India',stake:'Leads the world\'s most populous nation, balancing development needs against climate commitments and renewable energy expansion.'},
      {name:'Sultan Al Jaber',role:'COP28 President / ADNOC CEO',stake:'Represents the tension between fossil fuel-producing nations and climate action. His dual role highlights the complexity of transition.'},
    ],
    resolutionPaths:[
      {title:'Strengthened international agreements',description:'More ambitious commitments, binding mechanisms, and significantly increased climate finance for developing nations.'},
      {title:'Technology-driven transformation',description:'Massive investment in clean energy, storage, grid modernization, and carbon removal to make decarbonization economically attractive.'},
      {title:'Carbon pricing and market mechanisms',description:'Global carbon taxes or cap-and-trade with border adjustments, creating clear incentives for emissions reduction.'},
      {title:'Just transition frameworks',description:'Pairing climate policies with support for affected workers and communities, including job retraining and economic diversification.'}
    ],
    historicalPrecedent:'The Montreal Protocol (1987) is the most successful environmental precedent: a global agreement to phase out ozone-depleting chemicals that was universally ratified and successfully reversed ozone depletion. The key difference is that climate involves far more economically significant industries.'
 ,
    quickTake:"The science is clear: humans are warming the planet. The debate now is how fast to act, who pays, and how to balance green goals with livelihoods. Every fraction of a degree matters for billions of people.",
    pullQuote:"The calculus is shifting from climate action as sacrifice to climate action as industrial opportunity.",
    didYouKnow:"Solar energy costs have dropped 90% since 2010 \u2014 it's now the cheapest form of new electricity generation in most of the world.",
    discussionGuide:{
      ageNote:"Recommended for ages 13+",
      starters:["What does climate justice mean? Why do poor countries say wealthy ones should pay more to fix this?","If renewable energy is cheaper, why isn't everyone using it?","What's one thing you could change about your life for climate — and what's hard about it?"],
      values:"This involves balancing present wellbeing against future consequences, individual action versus systemic change, economic opportunity versus caution, and global cooperation versus national interests.",
      redFlags:"Watch for: false balance where you treat the science itself as debatable (it's not) while treating solutions as appropriately debatable. Dismissing concerns as hysteria or calling doubters villains. Both prevent productive dialogue.",
      activity:"Find out where your electricity comes from. Then research what it would take to change that. Talk to someone who works in energy to understand economic realities behind climate choices."
    },
    organizations:[{"name": "ClimateWorks Foundation", "what": "Funds and coordinates philanthropic efforts to reduce greenhouse gas emissions globally.", "tag": "Funding", "url": "https://www.climateworks.org"}, {"name": "World Resources Institute", "what": "Nonpartisan research on climate, energy, food, forests, water, and cities.", "tag": "Research", "url": "https://www.wri.org"}, {"name": "Citizens' Climate Lobby", "what": "Bipartisan grassroots advocacy for carbon pricing and climate solutions.", "tag": "Advocacy", "url": "https://citizensclimatelobby.org"}],
    actions:[{"icon": "\ud83d\udcd6", "title": "Understand deeper", "desc": "Follow the data, not the hot takes.", "links": [{"text": "World Resources Institute", "url": "https://www.wri.org"}, {"text": "NASA Climate portal", "url": "https://climate.nasa.gov"}]}, {"icon": "\ud83d\uddf3\ufe0f", "title": "Advocate for policy", "desc": "Climate policy moves when constituents demand it.", "links": [{"text": "Citizens' Climate Lobby", "url": "https://citizensclimatelobby.org"}, {"text": "Find your representatives", "url": "https://www.congress.gov/members/find-your-member"}]}, {"icon": "\ud83c\udf31", "title": "Reduce your footprint", "desc": "Individual actions that actually matter.", "links": [{"text": "EPA carbon footprint calculator", "url": "https://www.epa.gov/carbon-footprint-calculator"}, {"text": "Project Drawdown solutions", "url": "https://drawdown.org"}]}, {"icon": "\ud83e\udd1d", "title": "Support communities affected", "desc": "Climate impacts hit vulnerable communities first.", "links": [{"text": "International Rescue Committee", "url": "https://www.rescue.org"}, {"text": "Climate Justice Alliance", "url": "https://climatejusticealliance.org"}]}] },

  'gun-control': {
    title:'Gun Control', isWedge:true, intensity:'high', region:'United States', sensitivity:'This topic involves gun violence, mass shootings, and loss of life. Content may be distressing for those personally affected.', lastVerified:'March 2026',
    sources:[
      {id:1,text:'Gun violence data and epidemiology',org:'Johns Hopkins Center for Gun Violence Solutions',url:'https://publichealth.jhu.edu/center-for-gun-violence-solutions',date:'2024'},
      {id:2,text:'Gun policy research and what works to reduce violence',org:'RAND Corporation',url:'https://www.rand.org/research/gun-policy.html',date:'2024'},
      {id:3,text:'Supreme Court gun rights decisions and implications',org:'AP News',url:'https://apnews.com/',date:'2024'},
      {id:4,text:'Second Amendment and constitutional interpretation',org:'Council on Foreign Relations',url:'https://www.cfr.org/',date:'2024'},
      {id:5,text:'Public opinion on gun control measures',org:'Pew Research Center',url:'https://www.pewresearch.org/',date:'2024'},
      {id:6,text:'Community violence intervention programs',org:'Reuters',url:'https://www.reuters.com/',date:'2024'},
      {id:7,text:'State gun laws and effectiveness research',org:'BBC News',url:'https://www.bbc.com/news/world-us-canada',date:'2024'},
      {id:8,text:'Gun industry and policy landscape',org:'Giffords Law Center',url:'https://giffords.org/',date:'2024'}
    ],
    keyDates:[
      {date:'1791',event:'Second Amendment ratified as part of the Bill of Rights'},
      {date:'1994',event:'Federal Assault Weapons Ban enacted (expired 2004)'},
      {date:'2008',event:'DC v. Heller establishes individual right to bear arms'},
      {date:'2012',event:'Sandy Hook Elementary shooting; 26 killed'},
      {date:'2022',event:'Bipartisan Safer Communities Act signed after Uvalde shooting'},
      {date:'2022-24',event:'Supreme Court rulings in Bruen and other cases expand gun rights'},
    ],
    situation:"The United States has a unique relationship with firearms among developed nations. The Second Amendment protects the right to bear arms, and the country has an estimated 400 million civilian-owned firearms — more guns than people.\nGun violence claims approximately 45,000 American lives annually, including suicides, homicides, and accidents. Mass shootings generate intense but often short-lived political momentum for reform. Meanwhile, daily gun violence disproportionately affects communities of color.\nLegislative action remains extremely difficult despite widespread public support for specific measures like universal background checks. The issue is deeply entangled with constitutional interpretation, cultural identity, and powerful interest groups.",
    sides:[
      {name:'Gun rights advocates',coreBeliefs:'The Second Amendment guarantees an individual right to own firearms. Guns are essential for self-defense. Gun ownership is a check against tyranny. Enforcement of existing laws, not new restrictions, is the answer.',keyFigures:'NRA, Gun Owners of America, Second Amendment Foundation, many Republican legislators',c:'sc1'},
      {name:'Gun control advocates',coreBeliefs:'Common-sense regulations are consistent with the Second Amendment. Universal background checks, assault weapons bans, and red flag laws can save lives. The US is an outlier in gun deaths among developed nations.',keyFigures:'Everytown for Gun Safety, March for Our Lives, Giffords Law Center, many Democratic legislators',c:'sc2'},
      {name:'Middle ground',coreBeliefs:'Responsible ownership and sensible regulation are not mutually exclusive. Targeted measures can reduce violence without broadly restricting law-abiding citizens. Mental health and safe storage deserve more focus.',keyFigures:'Some sportsmen\'s organizations, certain rural Democrats, bipartisan legislators, public health researchers',c:'sc3'}
    ],
    importantDistinction:'Gun violence takes many forms requiring different solutions. Mass shootings are a small fraction of gun deaths. Suicides account for over half and are best addressed through safe storage and crisis intervention. Urban gun violence is driven by different factors than rural accidents or domestic violence.',
    missingVoices:'Survivors of gun violence, communities experiencing daily violence that doesn\'t make national news, rural Americans for whom guns are essential tools, responsible gun shop owners, and emergency room doctors treating gun wounds.',
    powerBrokers:[
      {name:'National Rifle Association',description:'Despite internal turmoil, remains the most politically influential gun rights organization with significant lobbying power.'},
      {name:'Gun industry',description:'Firearms manufacturers represent a multi-billion dollar industry with significant economic influence in certain states.'},
      {name:'US Supreme Court',description:'The 2008 Heller decision and subsequent rulings continue to shape what regulations are constitutionally permissible.'},
      {name:'Gun control organizations',description:'Groups like Everytown have built political infrastructure that increasingly rivals the NRA\'s influence.'}
    ],
    gameTheory:"The gun debate exhibits extreme status quo bias. The Senate's structure gives disproportionate power to rural, gun-owning states, while the filibuster requires 60 votes. Popular measures face enormous legislative hurdles.\nBoth sides face mobilization asymmetries: gun rights voters tend to be single-issue voters who punish any perceived threat, while control supporters, though more numerous in polls, tend to prioritize other issues. This favors the status quo.",
    keyLeaders:[
      {name:'Wayne LaPierre / NRA leadership',role:'NRA Executive Vice President (until 2024)',stake:'Led the NRA for decades; his departure amid corruption scandals opens questions about the organization\'s future direction and influence.'},
      {name:'Shannon Watts',role:'Founder of Moms Demand Action',stake:'Built a grassroots gun safety movement that has become a significant political force, especially in suburban districts.'},
      {name:'Chris Murphy',role:'US Senator from Connecticut',stake:'Sandy Hook occurred in his state. He led negotiations for the Bipartisan Safer Communities Act and remains the Senate\'s most prominent gun reform advocate.'},
      {name:'Supreme Court justices',role:'Constitutional arbiters',stake:'The conservative majority\'s expanding interpretation of the Second Amendment through cases like Bruen is reshaping what regulations can survive legal challenge.'},
    ],
    resolutionPaths:[
      {title:'Incremental federal legislation',description:'Building on the Bipartisan Safer Communities Act with universal background checks, safe storage incentives, and expanded red flag law frameworks.'},
      {title:'State-level innovation',description:'States as policy laboratories, implementing different approaches while researchers study which measures are most effective.'},
      {title:'Public health approach',description:'Reframing gun violence as a public health crisis. Investing in violence intervention programs, community solutions, and research.'},
      {title:'Technology solutions',description:'Smart gun technology, improved background check databases, and better tracing systems to reduce misuse while preserving access.'}
    ],
    historicalPrecedent:'Australia implemented sweeping reforms after the 1996 Port Arthur massacre, including a mandatory buyback of semi-automatic weapons. Gun deaths dropped significantly. However, Australia lacked a constitutional right to bear arms, making direct US comparison difficult.'
 ,
    quickTake:"America has more guns than people and roughly 45,000 gun deaths per year. Most Americans support specific reforms like background checks, but legislation stalls. The divide isn't just political \u2014 it's cultural and constitutional.",
    pullQuote:"Gun rights voters tend to be single-issue voters who punish any perceived threat, while control supporters tend to prioritize other issues at the ballot box.",
    didYouKnow:"Over half of US gun deaths are suicides, not homicides \u2014 safe storage laws are one of the most effective interventions available.",
    discussionGuide:{
      ageNote:"Recommended for ages 14+",
      starters:["What would a gun owner say their Second Amendment right is actually for? What would a gun control advocate say?","Are mass shootings a unique problem, or part of a larger gun violence issue?","Do you think gun rights and gun safety are opposites, or can they coexist?"],
      values:"This is about constitutional rights, public safety, personal liberty, cultural identity, evidence vs. fear, and trust in institutions. People disagree on which values dominate — not whether they matter.",
      redFlags:"Watch for: dismissing gun owners as paranoid or gun control supporters as authoritarian. Focusing on rare mass shootings while ignoring daily violence, or vice versa. Refusing to acknowledge that gun owners love their families too and want safety.",
      activity:"Visit a range or gun shop if possible, and speak with the people there about why guns matter to them. Then research gun violence in your community. Try to understand both without letting either erase the other."

function renderSignUpModal(){

  } else {

  }

  mkOv('auov','<div class="modal" role="dialog" aria-modal="true"><h3>Create your account</h3><div class="vsteps"><div class="vstep '+s1+'">1. Details</div><div class="vstep '+s2+'">2. Verify</div><div class="vstep '+s3+'">3. Done</div></div>'+body+'<br><button class="mcl" onclick="closeOv(\'auov\')">Cancel</button></div>');

  if(signupStep===2){
    // Generate demo code
    const code=String(Math.floor(100000+Math.random()*900000));
    pendingUser.code=code;
    setTimeout(()=>{const r=document.getElementById('su-reveal');if(r)r.textContent=code;},50);
  }
}

function signUpStep1(){
  const name=(document.getElementById('su-name')||{}).value?.trim();
  const email=(document.getElementById('su-email')||{}).value?.trim();
  const err=document.getElementById('su-err');
  if(!name||name.length<2){if(err)err.textContent='Please enter a name (2+ characters).';return;}
  if(!email||!email.includes('@')||!email.includes('.')){if(err)err.textContent='Please enter a valid email address.';return;}
  pendingUser.name=name;pendingUser.email=email;
  signupStep=2;renderSignUpModal();
}

function signUpStep2(){
  const code=(document.getElementById('su-code')||{}).value?.trim();
  const err=document.getElementById('su-err');
  if(!code||code!==pendingUser.code){if(err)err.textContent='Invalid code. Please try again.';return;}
  currentUser={name:pendingUser.name,email:pendingUser.email,verified:true};
  saveUser();
  signupStep=3;renderSignUpModal();
  renderAuthBar();
  // Re-render detail view
  const dv=document.getElementById('dview');
  if(dv.style.display!=='none'){
    const ckey=ck(curTitle);
    if(cache[ckey])renderDetail(cache[ckey],curTitle);
  }
}

function openSignIn(){
  mkOv('auov','<div class="modal" role="dialog" aria-modal="true"><h3>Sign in</h3><p>Welcome back! Enter the email you used to create your account.</p><label for="si-email">Email address</label><input type="email" id="si-email" placeholder="you@example.com" /><div class="merr" id="si-err"></div><button class="mbtn" onclick="doSignIn()">Sign in</button><br><button class="mcl" onclick="closeOv(\'auov\')">Cancel</button></div>');

function doSignIn(){
  const email=(document.getElementById('si-email')||{}).value?.trim();
  const err=document.getElementById('si-err');
  if(!email||!email.includes('@')){if(err)err.textContent='Please enter a valid email.';return;}

  const name=email.split('@')[0].replace(/[._]/g,' ').replace(/\b\w/g,l=>l.toUpperCase());
  currentUser={name,email,verified:true};
  saveUser();renderAuthBar();closeOv('auov');
  const dv=document.getElementById('dview');
  if(dv.style.display!=='none'){
    const ckey=ck(curTitle);
    if(cache[ckey])renderDetail(cache[ckey],curTitle);
  }
}

function scrollTidbits(dir){
  const track=document.getElementById('tidbit-scroll');
  if(!track)return;
  const cards=track.querySelectorAll('.tidbit-card');
  if(!cards.length)return;
  const cardW=cards[0].offsetWidth+10; // width + gap
  const visibleW=track.parentElement.offsetWidth;
  const maxIdx=Math.max(0,cards.length-Math.floor(visibleW/cardW));
  tidbitIdx=Math.max(0,Math.min(maxIdx,tidbitIdx+dir));
  track.style.transform='translateX(-'+tidbitIdx*cardW+'px)';
}

  document.getElementById('dview').style.display='';
  document.getElementById('bbtn').textContent=fs?'← Back to search':'← All conflicts';

  if(cache[ckey]){renderDetail(cache[ckey],title);window.scrollTo(0,0);return;}

  // Static data match
  let staticMatch=null;
  if(id&&STATIC_DATA[id])staticMatch=STATIC_DATA[id];
  else{
    const lower=title.toLowerCase();
    for(const key in STATIC_DATA){
      if(STATIC_DATA[key].title.toLowerCase().includes(lower)||lower.includes(STATIC_DATA[key].title.toLowerCase())||lower.includes(key.replace(/-/g,' '))){
        staticMatch=STATIC_DATA[key];break;
      }
    }
  }
  if(staticMatch){cache[ckey]=staticMatch;renderDetail(staticMatch,title);window.scrollTo(0,0);return;}

  // Custom search needs API key
  if(!apiKey){
    document.getElementById('dc').innerHTML=
      '<div class="nc"><strong>Custom search requires an API key.</strong> The eight featured topics work instantly. To analyze custom topics, add your Anthropic API key.</div>'+
      '<button class="retry" style="margin-top:8px;" onclick="openApiKeyModal()">Add API key</button>'+
      '<div style="margin-top:12px;"><button class="back" onclick="goHome()">← Browse featured topics</button></div>';
    return;
  }

  document.getElementById('dc').innerHTML=`<div class="loading"><div class="spin"></div><p>Analyzing "${eh(title)}"...</p></div>`;
  window.scrollTo(0,0);
  busy=true;document.getElementById('sbtn').disabled=true;
  if(ctrl)ctrl.abort();ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(),30000);
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      signal:ctrl.signal,
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:3000,
        system:'You are a nonpartisan educational analyst. Present every topic fairly without political bias.',
        messages:[{role:'user',content:'Analyze: "'+title+'"\n\nReturn ONLY raw JSON:\n{"isValidTopic":true,"invalidReason":"","title":"","isWedge":false,"intensity":"high","region":"","sensitivity":"","keyDates":[{"date":"","event":""}],"situation":"para1\\npara2","sides":[{"name":"","coreBeliefs":"","keyFigures":"","c":"sc1"}],"importantDistinction":"","missingVoices":"","powerBrokers":[{"name":"","description":""}],"gameTheory":"para1\\npara2","keyLeaders":[{"name":"","role":"","stake":""}],"resolutionPaths":[{"title":"","description":""}],"historicalPrecedent":""}'}]
      })
    });
    clearTimeout(timer);
    const data=await res.json();
    if(data.error)throw new Error(data.error.message||'API error');
    const raw=(data.content||[]).map(b=>b.text||'').join('');
    let clean=raw.replace(/```json|```/g,'').trim();
    const fi=clean.indexOf('{'),li=clean.lastIndexOf('}');
    if(fi>=0&&li>=0)clean=clean.slice(fi,li+1);
    const p=JSON.parse(clean);
    if(p.isValidTopic===false){document.getElementById('dc').innerHTML='<div class="nc"><strong>Not a recognized conflict topic.</strong> '+eh(p.invalidReason||'Please search for a specific geopolitical conflict or policy debate.')+'</div>';return;}
    const safe={title:p.title||title,isWedge:!!p.isWedge,intensity:p.intensity||'medium',region:p.region||'',sensitivity:p.sensitivity||null,keyDates:Array.isArray(p.keyDates)?p.keyDates:[],situation:p.situation||'',sides:Array.isArray(p.sides)?p.sides:[],importantDistinction:p.importantDistinction||'',missingVoices:p.missingVoices||'',powerBrokers:Array.isArray(p.powerBrokers)?p.powerBrokers:[],gameTheory:p.gameTheory||'',keyLeaders:Array.isArray(p.keyLeaders)?p.keyLeaders:[],resolutionPaths:Array.isArray(p.resolutionPaths)?p.resolutionPaths:[],historicalPrecedent:p.historicalPrecedent||''};
    cache[ckey]=safe;renderDetail(safe,title);
  }catch(e){
    clearTimeout(timer);
    const isTO=e.name==='AbortError';
    document.getElementById('dc').innerHTML='<div class="err"><strong>'+(isTO?'Request timed out.':'Analysis failed: '+eh(e.message))+'</strong> <button class="retry" onclick="go('+(id?'\''+eh(id)+'\'':'null')+',\''+eh(title)+'\','+fs+')">Retry</button></div>';
  }finally{busy=false;document.getElementById('sbtn').disabled=false;}
}

function sec(num,title,content,open,conflictTitle){
  const uid='s'+Math.random().toString(36).slice(2,8);
  const stKey=ck(conflictTitle||'')+'-'+num;
  const isOpen=sectionState[stKey]!==undefined?sectionState[stKey]:!!open;
  return '<div class="asec"><div class="ash" onclick="ts(\''+uid+'\',\''+stKey+'\')" role="button" tabindex="0" aria-expanded="'+isOpen+'" onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();ts(\''+uid+'\',\''+stKey+'\');}"><div class="ashl"><span class="asn">'+num+'</span><h4>'+title+'</h4></div><span class="chv" id="cv_'+uid+'">'+(isOpen?'▲':'▼')+'</span></div><div class="asbody'+(isOpen?' open':'')+'" id="'+uid+'">'+content+'</div></div>';
}

function ts(uid,stKey){
  const b=document.getElementById(uid),c=document.getElementById('cv_'+uid);
  b.classList.toggle('open');
  const isOpen=b.classList.contains('open');
  c.textContent=isOpen?'▲':'▼';
  // Update aria
  c.closest('.ash')?.setAttribute('aria-expanded',isOpen);
  if(stKey)sectionState[stKey]=isOpen;
}

/* ============================================================
   COMMENTS SYSTEM
   ============================================================ */
function buildCS(ckey, sides){
  const store=lcs();const list=store[ckey]||[];
  const isAuth=currentUser&&currentUser.verified;

  // Perspective options from sides
  let perspOpts='<option value="">Perspective (optional)</option><option value="Observer">Neutral observer</option>';
  if(sides&&sides.length){sides.forEach(s=>{perspOpts+='<option value="'+eh(s.name)+'">'+eh(s.name)+'</option>';});}
  perspOpts+='<option value="Other">Other</option>';

  // Guidelines
  let guidelines='<div class="cguidelines"><strong>Community values</strong><ul><li>Assume good intent — we\'re all trying to understand</li><li>Represent your own views authentically</li><li>You don\'t have to agree — you have to be curious</li><li>No personal attacks, spam, or dogpiling</li></ul></div>';

  // Contextual comment placeholder
  let placeholder='Share your perspective... All viewpoints welcome.';
  if(sides&&sides.length){
    const representedPersp=new Set(list.map(c=>c.perspective).filter(Boolean));
    const missing=sides.filter(s=>!representedPersp.has(s.name));
    if(missing.length>0&&missing.length<sides.length){
      placeholder='The "'+missing[0].name+'" perspective hasn\'t been shared yet. What would they say?';
    }
  }

  // Perspective breadth dots
  let pdots='';
  if(sides&&sides.length){
    const dotColors=['var(--rust)','var(--teal)','var(--sage)','var(--gold)'];
    const representedPersp=new Set(list.map(c=>c.perspective).filter(Boolean));
    pdots='<div class="persp-dots">';
    sides.forEach((s,i)=>{
      const has=representedPersp.has(s.name);
      pdots+='<span class="persp-dot'+(has?' filled':'')+'" style="'+(has?'background:'+dotColors[i%4]:'')+'" title="'+eh(s.name)+(has?' (represented)':' (not yet represented)')+'"></span>';
    });
    pdots+='</div>';
  }

  // Comment form or auth gate
  let form='';
  if(isAuth){
    form='<div class="cform"><textarea id="cta_'+ckey+'" maxlength="1000" placeholder="'+eh(placeholder)+'" oninput="ucr(\''+ckey+'\')"></textarea><div class="cfmeta"><select id="cps_'+ckey+'">'+perspOpts+'</select><span class="crem" id="crm_'+ckey+'">1000</span><span class="crate" id="crt_'+ckey+'"></span><button class="csub" id="csb_'+ckey+'" onclick="postC(\''+ckey+'\')">Post comment</button></div></div>';
  } else {
    form='<div class="cauth-gate"><p>Join the discussion — sign up or sign in to comment.<br>Verified accounts help keep this space thoughtful and spam-free.</p><button class="authbtn" onclick="openSignUp()">Sign up to comment</button></div>';
  }

  return '<div class="csec" id="csec_'+ckey+'"><div class="chd"><h4>Discussion</h4>'+pdots+'<span class="ccnt" id="ccnt_'+ckey+'">'+list.length+' comment'+(list.length!==1?'s':'')+'</span></div>'+guidelines+form+'<div id="cl_'+ckey+'">'+(list.length?'<div class="clist">'+list.map((c,i)=>buildCI(c,i,ckey)).join('')+'</div>':'<div class="noc">No comments yet. Be the first to share your perspective.</div>')+'</div></div>';
}

function buildCI(c,i,ckey){
  const init=(c.name||'A').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  const lk=ckey+'-'+i;const isL=liked.has(lk);const isF=flagged.has(lk);
  let meta='<div class="cimeta"><div class="av" style="background:'+AVCOLS[i%AVCOLS.length]+';">'+eh(init)+'</div><span class="cauth-name">'+eh(c.name||'Anonymous')+'</span>';
  if(c.verified) meta+='<span class="cvbadge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>Verified</span>';
  if(c.perspective) meta+='<span class="cperspective">'+eh(c.perspective)+'</span>';
  meta+='<span class="ctime">'+eh(c.time)+'</span></div>';

  let actions='<div class="cactions"><button class="clk'+(isL?' liked':'')+'" onclick="likeC(\''+ckey+'\','+i+')" aria-label="Mark as helpful">'+(isL?'&#9829;':'&#9825;')+' '+(c.likes||0)+' helpful</button>';
  actions+='<button class="cflag'+(isF?' flagged':'')+'" onclick="flagC(\''+ckey+'\','+i+')" aria-label="Flag comment">'+(isF?'Flagged':'Flag')+'</button></div>';

  return '<div class="ci">'+meta+'<div class="ctxt2">'+eh(c.text)+'</div>'+actions+'</div>';
}

function ucr(ckey){const ta=document.getElementById('cta_'+ckey),rm=document.getElementById('crm_'+ckey);if(ta&&rm)rm.textContent=1000-ta.value.length;}

function postC(ckey){
  if(!currentUser||!currentUser.verified)return;
  const ta=document.getElementById('cta_'+ckey);
  const ps=document.getElementById('cps_'+ckey);
  const rt=document.getElementById('crt_'+ckey);
  if(!ta)return;
  const txt=ta.value.trim();
  if(txt.length<3||txt.length>1000)return;

  // Rate limit check
  const now=Date.now();
  if(now-lastPostTime<RATE_LIMIT_MS){
    const secs=Math.ceil((RATE_LIMIT_MS-(now-lastPostTime))/1000);
    if(rt)rt.textContent='Please wait '+secs+'s before posting again.';
    return;
  }

  const store=lcs();if(!store[ckey])store[ckey]=[];
  const time=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'})+' '+new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  const perspective=ps?ps.value:'';
  store[ckey].push({name:currentUser.name,text:txt,time,likes:0,verified:true,perspective});
  scs(store);
  lastPostTime=Date.now();
  ta.value='';if(ps)ps.value='';ucr(ckey);if(rt)rt.textContent='';
  refreshCL(ckey,store);
}

function likeC(ckey,idx){
  const lk=ckey+'-'+idx;if(liked.has(lk))return;
  liked.add(lk);saveLiked();
  const store=lcs();
  if(store[ckey]&&store[ckey][idx]){store[ckey][idx].likes=(store[ckey][idx].likes||0)+1;scs(store);refreshCL(ckey,store);}
}

function flagC(ckey,idx){
  const lk=ckey+'-'+idx;if(flagged.has(lk))return;
  flagged.add(lk);saveFlagged();refreshCL(ckey,lcs());
}

function refreshCL(ckey,store){
  const list=store[ckey]||[];
  const cnt=document.getElementById('ccnt_'+ckey);if(cnt)cnt.textContent=list.length+' comment'+(list.length!==1?'s':'');
  const cl=document.getElementById('cl_'+ckey);
  if(cl)cl.innerHTML=list.length?'<div class="clist">'+list.map((c,i)=>buildCI(c,i,ckey)).join('')+'</div>':'<div class="noc">No comments yet.</div>';
}

function mkOv(id,html){
  let ov=document.getElementById(id);
  if(!ov){ov=document.createElement('div');ov.className='ovwrap';ov.id=id;document.getElementById('ovlayer').appendChild(ov);}
  ov.innerHTML=html;ov.classList.add('open');
  ov.addEventListener('click',function(e){if(e.target===ov)closeOv(id);});
  ov.addEventListener('keydown',function(e){
    if(e.key==='Escape'){closeOv(id);return;}
    if(e.key!=='Tab')return;
    const foc=[...ov.querySelectorAll('button,input,textarea,select')];if(!foc.length)return;
    if(e.shiftKey){if(document.activeElement===foc[0]){e.preventDefault();foc[foc.length-1].focus();}}
    else{if(document.activeElement===foc[foc.length-1]){e.preventDefault();foc[0].focus();}}
  });
  setTimeout(()=>{const f=ov.querySelector('input,button');if(f)f.focus();},30);
}

function doExport(fmt){
  const ckey=ck(curTitle);
  const d=cache[ckey];
  if(!d)return;
  let content='',filename='',mime='';

  if(fmt==='json'){
    content=JSON.stringify(d,null,2);
    filename=ckey+'.json';
    mime='application/json';
  } else if(fmt==='md'){
    let md='# '+d.title+'\n\n';
    if(d.quickTake)md+='> '+d.quickTake+'\n\n';
    md+='**Region:** '+d.region+' | **Intensity:** '+d.intensity;
    if(d.lastVerified)md+=' | **Last verified:** '+d.lastVerified;
    md+='\n\n';
    if(d.situation){md+='## The Situation\n\n'+d.situation.split('\n').join('\n\n')+'\n\n';}
    if(d.sides&&d.sides.length){
      md+='## The Sides\n\n';
      d.sides.forEach(s=>{md+='### '+s.name+'\n\n'+s.coreBeliefs+'\n\n';if(s.keyFigures)md+='*Key figures: '+s.keyFigures+'*\n\n';});
    }
    if(d.importantDistinction)md+='> **Important distinction:** '+d.importantDistinction+'\n\n';
    if(d.powerBrokers&&d.powerBrokers.length){
      md+='## Power Brokers\n\n';
      d.powerBrokers.forEach((b,i)=>{md+=(i+1)+'. **'+b.name+'** — '+b.description+'\n';});
      md+='\n';
    }
    if(d.gameTheory){md+='## Game Theory & Strategic Dynamics\n\n'+d.gameTheory.split('\n').join('\n\n')+'\n\n';}
    if(d.keyLeaders&&d.keyLeaders.length){
      md+='## Key Leaders\n\n';
      d.keyLeaders.forEach(l=>{md+='- **'+l.name+'** ('+l.role+'): '+l.stake+'\n';});
      md+='\n';
    }
    if(d.resolutionPaths&&d.resolutionPaths.length){
      md+='## Paths to Resolution\n\n';
      d.resolutionPaths.forEach((r,i)=>{md+=(i+1)+'. **'+r.title+'** — '+r.description+'\n';});
      md+='\n';
    }
    if(d.historicalPrecedent)md+='## Historical Precedent\n\n'+d.historicalPrecedent+'\n\n';
    if(d.sources&&d.sources.length){
      md+='## Sources\n\n';
      d.sources.forEach((s,i)=>{md+=(i+1)+'. '+s.org+' ('+s.date+') — '+s.text+(s.url?' [Link]('+s.url+')':'')+'\n';});
    }
    md+='\n---\n*Exported from Solutions, Thoughts & Ideas*\n';
    content=md;
    filename=ckey+'.md';
    mime='text/markdown';
  } else if(fmt==='csv'){
    let rows=[['Side','Core Beliefs','Key Figures']];
    if(d.sides)d.sides.forEach(s=>{rows.push([s.name,s.coreBeliefs,s.keyFigures||'']);});
    content=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
    filename=ckey+'-sides.csv';
    mime='text/csv';
  }

  const blob=new Blob([content],{type:mime});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
  closeOv('exov');
}

const TOC_SECTIONS=[
  {num:'00',title:'Key dates'},
  {num:'01',title:'The situation'},
  {num:'02',title:'The sides'},
  {num:'03',title:'Power brokers'},
  {num:'04',title:'Game theory'},
  {num:'05',title:'Paths to resolution'},
  {num:'06',title:'What you can do'},
  {num:'07',title:'Sources & references'}
];

function initTOC(){
  // Desktop TOC
  const toc=document.getElementById('toc');
  if(!toc)return;
  let tocHtml='';
  TOC_SECTIONS.forEach(s=>{
    tocHtml+='<button class="toc-item" onclick="scrollToSection(\''+s.num+'\')" role="link"><span class="toc-num">'+s.num+'</span>'+s.title+'</button>';
  });
  toc.innerHTML=tocHtml;
  toc.classList.add('visible');

  // Mobile TOC
  const mobList=document.getElementById('tocMobList');
  if(!mobList)return;
  let mobHtml='';
  TOC_SECTIONS.forEach(s=>{
    mobHtml+='<button class="toc-mob-item" onclick="scrollToSection(\''+s.num+'\');toggleTocMob();">'+s.num+': '+s.title+'</button>';
  });
  mobList.innerHTML=mobHtml;

  // Setup IntersectionObserver for active state
  setupTOCObserver();
}

function toggleTocMob(){
  const list=document.getElementById('tocMobList');
  if(!list)return;
  list.classList.toggle('open');
}

function scrollToSection(num){
  const sections=document.querySelectorAll('[id^="s"]');
  for(const sec of sections){
    const header=sec.previousElementSibling;
    if(!header)continue;
    const numEl=header.querySelector('.asn');
    if(numEl&&numEl.textContent===num){
      sec.parentElement.scrollIntoView({behavior:'smooth',block:'start'});
      return;
    }
  }
}

function setupTOCObserver(){
  const observer=new IntersectionObserver((entries)=>{
    let visibleNum=null;
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        const header=entry.target.previousElementSibling;
        if(header){
          const numEl=header.querySelector('.asn');
          if(numEl)visibleNum=numEl.textContent;
        }
      }
    });
    if(visibleNum){
      const tocItems=document.querySelectorAll('.toc-item,.toc-mob-item');
      tocItems.forEach(item=>{
        const hasNum=(item.textContent||'').includes(visibleNum);
        if(hasNum)item.classList.add('active');
        else item.classList.remove('active');
      });
    }
  },{threshold:0.3});

  const sections=document.querySelectorAll('[id^="s"]');
  sections.forEach(sec=>observer.observe(sec));
}

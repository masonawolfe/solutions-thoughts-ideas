<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f0ede8;--surf:#faf8f4;--card:#fff;
  --navy:#1c2b3a;--teal:#1e6b72;--teal-l:#e8f4f5;
  --rust:#b54a2a;--rust-l:#faf0ec;
  --gold:#9a7b2f;--gold-l:#faf5e8;
  --sage:#3a6b4a;--sage-l:#eaf4ed;
  --ink:#2c3e50;--muted:#6b8094;--faint:#98afc0;
  --rule:rgba(28,43,58,0.1);--rule2:rgba(28,43,58,0.2);
  --dp:'Playfair Display',Georgia,serif;
  --bd:'Source Sans 3',sans-serif;
}
:root[data-theme="dark"]{
  --bg:#1b1916;--surf:#242120;--card:#2e2a27;
  --navy:#e8e2d9;--teal:#3d9498;--teal-l:rgba(61,148,152,.14);
  --rust:#c7603e;--rust-l:rgba(199,96,62,.12);
  --gold:#c4993a;--gold-l:rgba(196,153,58,.12);
  --sage:#5a9e6a;--sage-l:rgba(90,158,106,.12);
  --ink:#cec7bc;--muted:#968e83;--faint:#665e55;
  --rule:rgba(255,248,240,0.08);--rule2:rgba(255,248,240,0.15);
}
body{font-family:var(--bd);background:var(--bg);color:var(--ink);min-height:100vh;}
a.skipnav{position:absolute;left:-999px;top:4px;z-index:999;padding:8px 16px;background:var(--navy);color:#fff;border-radius:4px;font-size:.82rem;text-decoration:none;}
a.skipnav:focus{left:8px;}
#app{max-width:960px;margin:0 auto;padding:0 1.5rem 5rem;position:relative;}
.hdr{padding:2rem 0 0;}
.hdr h1{font-family:var(--dp);font-size:clamp(1.6rem,4vw,2.1rem);font-weight:700;color:var(--navy);line-height:1.1;}
.hdr .sub{font-size:.69rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:5px;}
.hbar{height:2px;background:linear-gradient(90deg,var(--navy),var(--teal) 40%,var(--rust) 70%,var(--gold));border-radius:2px;margin:1rem 0 1.6rem;}

/* ===== Auth bar ===== */
.authbar{display:flex;align-items:center;justify-content:flex-end;gap:8px;margin-bottom:.6rem;min-height:32px;}
.authbar .uinfo{display:flex;align-items:center;gap:6px;font-size:.76rem;color:var(--navy);}
.authbar .uinfo .vbadge{display:inline-flex;align-items:center;gap:3px;padding:1px 7px;border-radius:20px;background:var(--sage-l);color:var(--sage);font-size:.62rem;font-weight:600;letter-spacing:.04em;}
.authbar .uinfo .vbadge svg{width:10px;height:10px;}
.authbtn{padding:5px 13px;border-radius:6px;border:1px solid var(--rule2);background:var(--card);font-family:var(--bd);font-size:.76rem;font-weight:600;color:var(--navy);cursor:pointer;transition:all .15s;}
.authbtn:hover{background:var(--navy);color:#fff;border-color:var(--navy);}
.authbtn.out{background:transparent;border-color:var(--rule);color:var(--muted);font-weight:500;}
.authbtn.out:hover{color:var(--rust);border-color:var(--rust);}

/* ===== Search ===== */
.sw{display:flex;border:1.5px solid var(--rule2);border-radius:8px;overflow:hidden;background:var(--card);margin-bottom:.4rem;transition:border-color .2s;}
.sw:focus-within{border-color:var(--teal);}
.sw input{flex:1;padding:12px 14px;border:none;font-family:var(--bd);font-size:.9rem;background:transparent;color:var(--ink);outline:none;min-width:0;}
.sw .cc{padding:12px 6px;font-size:.71rem;color:var(--faint);align-self:center;white-space:nowrap;display:none;}
.sw button{padding:12px 20px;background:var(--navy);color:#fff;border:none;font-family:var(--bd);font-size:.83rem;font-weight:600;cursor:pointer;transition:background .2s;white-space:nowrap;}
.sw button:hover{background:var(--teal);}
.sw button:disabled{background:var(--faint);cursor:not-allowed;}
.hint{font-size:.71rem;color:var(--rust);min-height:1rem;margin-bottom:.9rem;display:block;}
.slbl{font-size:.67rem;letter-spacing:.15em;text-transform:uppercase;color:var(--faint);font-weight:600;margin-bottom:.9rem;}

/* ===== Grid cards ===== */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:10px;margin-bottom:2.5rem;}
.cc2{background:var(--card);border-radius:8px;padding:1rem 1.1rem;cursor:pointer;transition:all .18s;border:1px solid var(--rule);}
.cc2:hover,.cc2:focus{transform:translateY(-2px);box-shadow:0 5px 18px rgba(28,43,58,.09);border-color:var(--navy);outline:none;}
.hrow{display:flex;align-items:center;margin-bottom:6px;justify-content:space-between;}
.hrowl{display:flex;align-items:center;}
.hdot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;}
.htxt{font-size:.68rem;color:var(--muted);}
.rdtime{font-size:.6rem;color:var(--faint);}
.hc{background:#c0392b;}.hh{background:var(--rust);}.hm{background:var(--gold);}.hl{background:var(--sage);}
.cc2 h3{font-family:var(--dp);font-size:1rem;font-weight:600;color:var(--navy);margin-bottom:4px;line-height:1.2;}
.cc2 p{font-size:.76rem;color:var(--muted);line-height:1.5;}
.ctags{margin-top:7px;display:flex;flex-wrap:wrap;gap:3px;}
.ctag{font-size:.6rem;letter-spacing:.07em;text-transform:uppercase;padding:2px 7px;border-radius:20px;font-weight:600;background:var(--bg);color:var(--muted);}
.ctag-w{background:rgba(154,123,47,.12);color:var(--gold);}

/* ===== Detail view ===== */
.back{background:none;border:none;cursor:pointer;color:var(--muted);font-family:var(--bd);font-size:.81rem;padding:0;margin-bottom:1.4rem;display:flex;align-items:center;gap:5px;transition:color .2s;}
.back:hover{color:var(--navy);}
.mast{background:var(--navy);border-radius:10px;padding:1.6rem 1.8rem;margin-bottom:.9rem;color:#fff;}
.mast h2{font-family:var(--dp);font-size:clamp(1.5rem,3.5vw,2rem);font-weight:700;color:#fff;line-height:1.15;margin-bottom:4px;}
.wbadge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:.62rem;letter-spacing:.09em;text-transform:uppercase;background:rgba(154,123,47,.25);color:#e8c96a;font-weight:600;margin-top:6px;margin-bottom:6px;}
.mmeta{display:flex;align-items:center;gap:11px;flex-wrap:wrap;margin-bottom:1rem;}
.mchip{font-size:.67rem;letter-spacing:.09em;text-transform:uppercase;color:rgba(255,255,255,.5);display:flex;align-items:center;gap:4px;}
.idot{display:inline-block;width:6px;height:6px;border-radius:50%;}
.abar{display:flex;gap:7px;flex-wrap:wrap;}
.ab{display:flex;align-items:center;gap:5px;padding:6px 13px;border-radius:6px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:rgba(255,255,255,.8);font-family:var(--bd);font-size:.76rem;cursor:pointer;transition:all .15s;font-weight:500;}
.ab:hover{background:rgba(255,255,255,.16);color:#fff;}
.ab svg{width:13px;height:13px;flex-shrink:0;}

/* Sensitivity notice */
.sensnote{display:flex;align-items:flex-start;gap:8px;padding:10px 14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:7px;margin-top:10px;font-size:.72rem;color:rgba(255,255,255,.65);line-height:1.5;}
.sensnote svg{width:14px;height:14px;flex-shrink:0;margin-top:1px;opacity:.6;}

/* ===== Grid tabs ===== */
.grid-tabs{display:flex;gap:4px;margin-bottom:12px;}
.grid-tab{padding:6px 16px;border-radius:20px;border:1px solid var(--rule2);background:var(--card);font-family:var(--bd);font-size:.78rem;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;}
.grid-tab:hover{border-color:var(--navy);color:var(--navy);}
.grid-tab.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.trend-count{display:inline-block;padding:0 6px;border-radius:10px;background:rgba(255,255,255,.2);font-size:.68rem;margin-left:4px;}
.grid-tab.active .trend-count{background:rgba(255,255,255,.25);}

/* ===== News section ===== */
.news-section{background:var(--card);border-radius:8px;margin-bottom:12px;border:1px solid var(--rule);padding:1rem 1.1rem;margin-top:6px;}
.news-hdr{display:flex;align-items:center;gap:6px;font-size:.78rem;font-weight:600;color:var(--navy);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;}
.news-loading{font-size:.76rem;color:var(--faint);padding:8px 0;}
.news-empty{font-size:.76rem;color:var(--faint);}
.news-item{display:block;padding:8px 0;border-bottom:1px solid var(--rule);text-decoration:none;transition:background .15s;}
.news-item:last-child{border-bottom:none;}
.news-item:hover{background:var(--surf);border-radius:4px;padding-left:6px;}
.news-meta{display:flex;gap:8px;align-items:center;margin-bottom:2px;}
.news-source{font-size:.65rem;font-weight:600;color:var(--teal);text-transform:uppercase;letter-spacing:.06em;}
.news-time{font-size:.62rem;color:var(--faint);}
.news-title{font-size:.82rem;color:var(--ink);line-height:1.4;}

/* ===== Sections ===== */
.asec{background:var(--card);border-radius:8px;margin-bottom:12px;border:1px solid var(--rule);overflow:hidden;}
.ash{padding:.88rem 1.1rem;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:background .15s;}
.ash:hover{background:var(--surf);}
.ashl{display:flex;align-items:center;gap:9px;}
.asn{font-size:.62rem;letter-spacing:.1em;color:var(--faint);font-weight:600;text-transform:uppercase;min-width:18px;}
.ash h4{font-family:var(--dp);font-size:.95rem;font-weight:600;color:var(--navy);}


.asbody p{font-size:.86rem;line-height:1.78;color:var(--ink);margin-bottom:.85rem;}
.asbody p:last-child{margin-bottom:0;}

/* Sides grid */
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px;}
.sc{border-radius:7px;padding:.85rem;border:1px solid var(--rule);}
.sc1{background:var(--rust-l);border-color:rgba(181,74,42,.2);}
.sc1 .sn{color:var(--rust);}
.sc2{background:var(--teal-l);border-color:rgba(30,107,114,.2);}
.sc2 .sn{color:var(--teal);}
.sc3{background:var(--sage-l);border-color:rgba(58,107,74,.2);}
.sc3 .sn{color:var(--sage);}
.sc4{background:var(--gold-l);border-color:rgba(154,123,47,.2);}
.sc4 .sn{color:var(--gold);}
.sn{font-family:var(--dp);font-size:.94rem;font-weight:600;margin-bottom:4px;}
.sb{font-size:.79rem;line-height:1.62;color:var(--ink);}
.sf{margin-top:6px;font-size:.68rem;color:var(--muted);}
.cbox{border-left:3px solid var(--teal);background:var(--teal-l);border-radius:0 5px 5px 0;padding:.75rem .9rem;margin-top:.8rem;font-size:.8rem;line-height:1.65;color:var(--ink);}
.cbox strong{color:var(--navy);font-weight:600;}
.cboxv{border-color:var(--sage);background:var(--sage-l);}

/* Key leaders */
.kldr{margin-top:.9rem;border:1px solid var(--rule);border-radius:7px;overflow:hidden;}
.kldr-h{padding:.65rem .9rem;background:var(--surf);font-size:.72rem;font-weight:600;color:var(--navy);letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--rule);display:flex;align-items:center;gap:5px;}
.kldr-h svg{width:12px;height:12px;color:var(--gold);}
.kldr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:0;}
.kldr-item{padding:.7rem .9rem;border-bottom:1px solid var(--rule);border-right:1px solid var(--rule);}
.kldr-item:last-child{border-bottom:none;}
.kldr-name{font-weight:600;font-size:.8rem;color:var(--navy);margin-bottom:2px;}
.kldr-role{font-size:.7rem;color:var(--muted);}
.kldr-stake{font-size:.72rem;color:var(--ink);line-height:1.5;margin-top:3px;}

/* Key dates timeline */
.tline{margin-top:.9rem;border-left:2px solid var(--teal);padding-left:14px;}
.titem{padding:.5rem 0;position:relative;}
.titem::before{content:'';position:absolute;left:-19px;top:.7rem;width:8px;height:8px;border-radius:50%;background:var(--teal);border:2px solid var(--card);}
.tdate{font-size:.66rem;font-weight:600;color:var(--teal);text-transform:uppercase;letter-spacing:.05em;}
.tevent{font-size:.79rem;color:var(--ink);line-height:1.5;margin-top:1px;}

/* Power brokers & lists */
.bl{list-style:none;}
.bi{display:flex;gap:11px;padding:.75rem 0;border-bottom:1px solid var(--rule);}
.bi:last-child{border-bottom:none;}
.brk{font-family:var(--dp);font-size:1.2rem;font-weight:700;color:var(--faint);min-width:24px;line-height:1.1;}
.bn{font-weight:600;font-size:.84rem;color:var(--navy);margin-bottom:2px;}
.bd2{font-size:.77rem;color:var(--muted);line-height:1.5;}
.rl{list-style:none;counter-reset:r;}
.ri{counter-increment:r;padding:.8rem 0 .8rem 1.9rem;border-bottom:1px solid var(--rule);position:relative;}
.ri:last-child{border-bottom:none;}
.ri::before{content:counter(r);position:absolute;left:0;top:.8rem;font-family:var(--dp);font-size:1.05rem;font-weight:700;color:var(--faint);}
.rt{font-weight:600;font-size:.84rem;color:var(--navy);margin-bottom:2px;}
.rd{font-size:.77rem;color:var(--muted);line-height:1.5;}

/* Loading / error */
.loading{text-align:center;padding:3rem 1rem;}
.spin{width:26px;height:26px;border:2px solid var(--rule);border-top-color:var(--teal);border-radius:50%;animation:sp .8s linear infinite;margin:0 auto .9rem;}
@keyframes sp{to{transform:rotate(360deg);}}
.loading p{font-size:.8rem;color:var(--muted);}
.err{padding:1.1rem;background:var(--rust-l);border:1px solid rgba(181,74,42,.2);border-radius:7px;font-size:.82rem;color:var(--rust);margin-bottom:.8rem;}
.nc{padding:1.2rem;background:var(--gold-l);border:1px solid rgba(154,123,47,.2);border-radius:7px;font-size:.83rem;color:var(--gold);margin-bottom:.8rem;}
.retry{margin-left:8px;padding:3px 11px;background:var(--navy);color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:.78rem;font-family:var(--bd);}
.empty{font-size:.82rem;color:var(--muted);padding:.2rem 0;}
.disc{margin-top:.9rem;padding:.75rem 1rem;background:var(--surf);border-radius:5px;font-size:.68rem;color:var(--faint);line-height:1.65;border:1px solid var(--rule);}

/* ===== Comments ===== */
.csec{background:var(--card);border-radius:8px;margin-bottom:7px;border:1px solid var(--rule);overflow:hidden;}
.chd{padding:.88rem 1.1rem;border-bottom:1px solid var(--rule);display:flex;align-items:center;justify-content:space-between;}
.chd h4{font-family:var(--dp);font-size:.95rem;font-weight:600;color:var(--navy);}
.ccnt{font-size:.7rem;color:var(--muted);background:var(--bg);padding:2px 8px;border-radius:20px;}

/* Community guidelines */
.cguidelines{padding:.65rem 1rem;background:var(--surf);border-bottom:1px solid var(--rule);font-size:.68rem;color:var(--muted);line-height:1.6;}
.cguidelines strong{color:var(--navy);font-weight:600;}
.cguidelines ul{margin:.3rem 0 0 1.2rem;list-style:disc;}
.cguidelines ul li{margin-bottom:2px;}

/* Auth gate for comments */
.cauth-gate{padding:1.2rem;text-align:center;}
.cauth-gate p{font-size:.82rem;color:var(--muted);margin-bottom:.7rem;line-height:1.5;}
.cauth-gate .authbtn{padding:8px 20px;font-size:.82rem;}

/* Comment form */
.cform{padding:.9rem;}
.cform textarea{width:100%;border:1px solid var(--rule);border-radius:6px;padding:9px 11px;font-family:var(--bd);font-size:.82rem;color:var(--ink);resize:vertical;min-height:70px;background:var(--surf);outline:none;transition:border-color .2s;}
.cform textarea:focus{border-color:var(--teal);}
.cfmeta{display:flex;gap:6px;margin-top:6px;align-items:center;flex-wrap:wrap;}
.cform select{padding:7px 8px;border:1px solid var(--rule);border-radius:6px;font-family:var(--bd);font-size:.78rem;color:var(--ink);background:var(--surf);outline:none;cursor:pointer;}
.cform select:focus{border-color:var(--teal);}
.csub{padding:7px 14px;background:var(--navy);color:#fff;border:none;border-radius:6px;font-family:var(--bd);font-size:.79rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:background .2s;}
.csub:hover{background:var(--teal);}
.csub:disabled{background:var(--faint);cursor:not-allowed;}
.crem{font-size:.69rem;color:var(--faint);white-space:nowrap;}
.crate{font-size:.66rem;color:var(--rust);margin-left:auto;}
.clist{padding:.2rem 1rem .9rem;}
.ci{padding:.8rem 0;border-bottom:1px solid var(--rule);}
.ci:last-child{border-bottom:none;}
.cimeta{display:flex;align-items:center;gap:7px;margin-bottom:3px;}
.av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.66rem;font-weight:600;flex-shrink:0;color:#fff;}
.cauth-name{font-size:.8rem;font-weight:600;color:var(--navy);}
.cvbadge{display:inline-flex;align-items:center;gap:2px;font-size:.58rem;color:var(--sage);font-weight:600;letter-spacing:.03em;}
.cvbadge svg{width:9px;height:9px;}
.ctime{font-size:.68rem;color:var(--faint);}
.cperspective{font-size:.62rem;padding:1px 6px;border-radius:10px;background:var(--bg);color:var(--muted);font-weight:500;}
.ctxt2{font-size:.8rem;color:var(--ink);line-height:1.58;margin-left:33px;}
.cactions{margin-left:33px;margin-top:4px;display:flex;align-items:center;gap:10px;}
.clk{background:none;border:none;font-size:.68rem;color:var(--muted);cursor:pointer;font-family:var(--bd);padding:0;transition:color .15s;}
.clk:hover,.clk.liked{color:var(--rust);}
.cflag{background:none;border:none;font-size:.64rem;color:var(--faint);cursor:pointer;font-family:var(--bd);padding:0;transition:color .15s;}
.cflag:hover{color:var(--rust);}
.cflag.flagged{color:var(--rust);cursor:default;}
.noc{padding:.8rem 1rem;font-size:.79rem;color:var(--faint);font-style:italic;}

/* ===== Modals ===== */
.ovwrap{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:100;padding:1rem;}
.ovwrap.open{display:flex;}
.modal{background:var(--card);border-radius:10px;padding:1.6rem;max-width:420px;width:100%;max-height:90vh;overflow-y:auto;}
.modal h3{font-family:var(--dp);font-size:1.2rem;font-weight:700;margin-bottom:.5rem;color:var(--navy);}
.modal p{font-size:.81rem;color:var(--muted);margin-bottom:.9rem;line-height:1.6;}
.modal label{display:block;font-size:.79rem;font-weight:600;color:var(--navy);margin-bottom:4px;}
.modal input[type=text],.modal input[type=email],.modal input[type=password]{width:100%;padding:9px 11px;border:1px solid var(--rule);border-radius:6px;font-family:var(--bd);font-size:.82rem;color:var(--ink);background:var(--surf);outline:none;margin-bottom:.7rem;}
.modal input:focus{border-color:var(--teal);}
.modal .mbtn{width:100%;padding:10px;background:var(--navy);color:#fff;border:none;border-radius:6px;font-family:var(--bd);font-size:.83rem;font-weight:600;cursor:pointer;margin-bottom:.5rem;transition:background .15s;}
.modal .mbtn:hover{background:var(--teal);}
.modal .mbtn:disabled{background:var(--faint);cursor:not-allowed;}
.modal .note{font-size:.68rem;color:var(--faint);line-height:1.5;}
.modal .merr{font-size:.74rem;color:var(--rust);margin-bottom:.6rem;min-height:1rem;}
.modal .mok{font-size:.74rem;color:var(--sage);margin-bottom:.6rem;min-height:1rem;}

/* Share modal */
.surl{display:flex;gap:5px;margin-bottom:.4rem;}
.surl input{flex:1;padding:8px 10px;border:1px solid var(--rule);border-radius:6px;font-size:.77rem;color:var(--muted);background:var(--surf);font-family:var(--bd);}
.surl button{padding:8px 12px;background:var(--teal);color:#fff;border:none;border-radius:6px;font-size:.77rem;cursor:pointer;font-family:var(--bd);font-weight:600;}
.toast{font-size:.71rem;color:var(--sage);min-height:1rem;margin-bottom:.4rem;}
.splats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:.9rem;}
.splat{display:flex;align-items:center;gap:6px;padding:9px 12px;border:1px solid var(--rule);border-radius:7px;background:var(--surf);cursor:pointer;font-family:var(--bd);font-size:.79rem;font-weight:500;color:var(--navy);transition:all .15s;}
.splat:hover{background:var(--bg);border-color:var(--teal);}
.splat svg{width:15px;height:15px;flex-shrink:0;}
.mcl{width:100%;padding:9px;background:none;border:1px solid var(--rule);border-radius:6px;font-family:var(--bd);font-size:.8rem;color:var(--muted);cursor:pointer;transition:all .15s;}
.mcl:hover{border-color:var(--navy);color:var(--navy);}

/* Verify steps */
.vsteps{display:flex;gap:6px;margin-bottom:.9rem;}
.vstep{flex:1;text-align:center;padding:8px 4px;border-radius:6px;background:var(--bg);font-size:.7rem;color:var(--faint);font-weight:600;}
.vstep.active{background:var(--navy);color:#fff;}
.vstep.done{background:var(--sage-l);color:var(--sage);}

/* Print */
@media print{
  body{background:#fff;}
  .authbar,.sw,.hint,.slbl,.abar,.csec,.disc,.back,.sensnote,.cguidelines,.ovwrap,.interstitial,.tidbit-feed{display:none!important;}
  .mast{background:#1c2b3a!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .asec{break-inside:avoid;}
  .asbody{display:block!important;border-top:1px solid #ddd!important;}
  .chv{display:none!important;}
  .ash{cursor:default!important;}
  .ash:hover{background:transparent!important;}
  .sc,.kldr-item,.cbox,.cboxv,.titem{break-inside:avoid;}
  .hdot,.idot{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  #hview{display:none!important;}
  #dview{display:block!important;}
}

@media(max-width:420px){
  #app{padding:0 1rem 4rem;}
  .abar{flex-direction:column;}.ab{justify-content:center;}
  .splats{grid-template-columns:1fr;}
  .kldr-grid{grid-template-columns:1fr;}
  .cgrid{grid-template-columns:1fr;}
  .sgrid{grid-template-columns:1fr;}
  .action-grid{grid-template-columns:1fr;}
  .org-grid{grid-template-columns:1fr;}
  .export-grid{grid-template-columns:1fr;}
  .tidbit-card{flex:0 0 220px;}
  /* Touch targets minimum 44px */
  .authbtn{padding:10px 16px;min-height:44px;}
  .grid-tab{padding:10px 18px;min-height:44px;}
  .back{padding:8px 0;min-height:44px;display:inline-flex;align-items:center;}
  .retry{padding:8px 14px;min-height:44px;}
  .tidbit-nav-btn{width:44px;height:44px;}
  .theme-toggle{width:44px;height:44px;}
  .ab{padding:10px 14px;min-height:44px;}
  .splat{padding:12px 14px;min-height:44px;}
  /* Slightly larger fonts for small screens */
  .asn{font-size:.7rem;}
  .news-time{font-size:.7rem;}
  .news-title a{word-break:break-word;}
  .modal{padding:1.2rem;max-width:calc(100vw - 2rem);}
}
/* Quick Take */
.qtake{background:var(--card);border-radius:8px;padding:1.1rem 1.3rem;margin-bottom:.9rem;border:1px solid var(--rule);border-left:3px solid var(--teal);}
.qtake-lbl{font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:var(--teal);font-weight:600;margin-bottom:5px;}
.qtake p{font-size:.88rem;line-height:1.75;color:var(--ink);}

/* Pull quote */
.pullq{margin:1rem 0;padding:.8rem 1.2rem;border-left:3px solid var(--gold);font-family:var(--dp);font-size:1.05rem;font-weight:600;color:var(--navy);line-height:1.45;}

/* Interstitial / emotional reset */
.interstitial{text-align:center;padding:1.6rem 1.2rem;margin:.7rem 0;background:linear-gradient(135deg,var(--teal-l),var(--sage-l));border-radius:10px;}
.interstitial h3{font-family:var(--dp);font-size:1.1rem;font-weight:700;color:var(--navy);margin-bottom:5px;}
.interstitial p{font-size:.82rem;color:var(--muted);line-height:1.6;max-width:520px;margin:0 auto;}

/* What You Can Do section */
.action-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-top:.7rem;}
.action-card{background:var(--surf);border:1px solid var(--rule);border-radius:8px;padding:1rem;cursor:default;transition:all .15s;}
.action-card:hover{border-color:var(--teal);background:var(--card);}
.action-icon{font-size:1.3rem;margin-bottom:5px;}
.action-card h5{font-family:var(--dp);font-size:.88rem;font-weight:600;color:var(--navy);margin-bottom:4px;}
.action-card p{font-size:.74rem;color:var(--muted);line-height:1.5;margin-bottom:6px;}
.action-links{list-style:none;}
.action-links li{font-size:.72rem;color:var(--teal);padding:2px 0;}
.action-links li a{color:var(--teal);text-decoration:none;border-bottom:1px dotted var(--teal);}
.action-links li a:hover{color:var(--navy);}

/* Organization cards */
.org-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin-top:.6rem;}
.org-card{background:var(--card);border:1px solid var(--rule);border-radius:7px;padding:.8rem;transition:border-color .15s;}
.org-card:hover{border-color:var(--teal);}
.org-name{font-weight:600;font-size:.8rem;color:var(--navy);margin-bottom:3px;}
.org-what{font-size:.7rem;color:var(--muted);line-height:1.5;margin-bottom:4px;}
.org-tag{display:inline-block;font-size:.58rem;padding:1px 6px;border-radius:10px;background:var(--bg);color:var(--faint);font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
.org-link{display:block;margin-top:5px;font-size:.68rem;color:var(--teal);text-decoration:none;}
.org-link:hover{color:var(--navy);}

/* Tidbit feed */
.tidbit-feed{margin-bottom:2rem;}
.tidbit-feed-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem;}
.tidbit-feed-lbl{font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:var(--teal);font-weight:600;display:flex;align-items:center;gap:5px;}
.tidbit-feed-lbl svg{width:13px;height:13px;}
.tidbit-feed-nav{display:flex;gap:4px;}
.tidbit-nav-btn{width:28px;height:28px;border-radius:50%;border:1px solid var(--rule);background:var(--card);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:.7rem;padding:0;}
.tidbit-nav-btn:hover{background:var(--teal);color:#fff;border-color:var(--teal);}
.tidbit-track{overflow:hidden;position:relative;}
.tidbit-scroll{display:flex;gap:10px;transition:transform .4s ease;will-change:transform;}
@media(prefers-reduced-motion:reduce){.tidbit-scroll{transition:none;}}
.tidbit-card{flex:0 0 280px;background:var(--teal-l);border:1px solid rgba(30,107,114,.15);border-radius:8px;padding:.9rem 1rem;cursor:pointer;transition:border-color .15s;}
.tidbit-card:hover{border-color:var(--teal);}
.tidbit-topic{font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--teal);font-weight:600;margin-bottom:4px;opacity:.7;}
.tidbit-card p{font-size:.79rem;color:var(--ink);line-height:1.6;margin:0;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;}
@media(max-width:420px){.tidbit-card{flex:0 0 calc(100vw - 3rem);}}

/* Perspective breadth dots */
.persp-dots{display:flex;gap:4px;align-items:center;}
.persp-dot{width:8px;height:8px;border-radius:50%;background:var(--rule);transition:background .3s;}
.persp-dot.filled{background:var(--teal);}

/* Smooth accordion animation */
.asbody{padding:1.15rem;display:none;border-top:1px solid var(--rule);}
.asbody.open{display:block;}
.chv{font-size:.62rem;color:var(--faint);transition:transform .2s;}

/* Reflective pause */
.pause{text-align:center;padding:.6rem;font-size:.72rem;color:var(--faint);font-style:italic;margin:.5rem 0;}

/* Reduced motion */
@media(prefers-reduced-motion:reduce){
  *{animation-duration:0.01ms!important;animation-iteration-count:1!important;transition-duration:0.01ms!important;}
  .cc2:hover,.cc2:focus{transform:none;}
}

/* ===== Sources section ===== */
.src-list{list-style:none;counter-reset:src;}
.src-item{counter-increment:src;padding:.6rem 0 .6rem 2rem;border-bottom:1px solid var(--rule);position:relative;font-size:.79rem;line-height:1.6;}
.src-item:last-child{border-bottom:none;}
.src-item::before{content:counter(src);position:absolute;left:0;top:.6rem;font-family:var(--dp);font-size:.85rem;font-weight:700;color:var(--faint);}
.src-org{font-weight:600;color:var(--navy);}
.src-date{font-size:.68rem;color:var(--faint);margin-left:6px;}
.src-link{color:var(--teal);text-decoration:none;border-bottom:1px dotted var(--teal);font-size:.74rem;}
.src-link:hover{color:var(--navy);}
sup.cite{color:var(--teal);cursor:pointer;font-size:.65rem;font-weight:600;padding:0 1px;text-decoration:none;}
sup.cite:hover{color:var(--navy);text-decoration:underline;}

/* ===== Table of Contents ===== */
.toc{position:fixed;left:max(8px,calc((100vw - 960px)/2 - 160px));top:50%;transform:translateY(-50%);width:140px;background:var(--card);border:1px solid var(--rule);border-radius:8px;padding:.6rem;box-shadow:0 2px 12px rgba(0,0,0,.06);z-index:50;display:none;}
.toc.visible{display:block;}
.toc-item{display:block;padding:4px 8px;font-size:.68rem;color:var(--muted);border-radius:4px;cursor:pointer;transition:all .15s;border:none;background:none;width:100%;text-align:left;font-family:var(--bd);}
.toc-item:hover{background:var(--surf);color:var(--navy);}
.toc-item.active{background:var(--teal-l);color:var(--teal);font-weight:600;}
.toc-num{font-family:var(--dp);font-weight:700;margin-right:4px;opacity:.5;}

/* Mobile TOC */
.toc-mob{display:none;position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:50;}
.toc-pill{padding:8px 16px;background:var(--navy);color:#fff;border:none;border-radius:20px;font-family:var(--bd);font-size:.74rem;font-weight:600;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.15);transition:background .15s;}
.toc-pill:hover{background:var(--teal);}
.toc-mob-list{display:none;position:absolute;bottom:44px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--rule);border-radius:8px;padding:.5rem;box-shadow:0 4px 20px rgba(0,0,0,.12);min-width:200px;}
.toc-mob-list.open{display:block;}
.toc-mob-item{display:block;padding:8px 12px;font-size:.76rem;color:var(--ink);border-radius:4px;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:var(--bd);}
.toc-mob-item:hover{background:var(--surf);}

@media(min-width:769px){.toc-mob{display:none!important;}}
@media(max-width:768px){.toc{display:none!important;}.toc-mob{display:block;}}

/* ===== Dark mode overrides ===== */
:root[data-theme="dark"] .mast{background:#2e2a27;}
:root[data-theme="dark"] .mast h2{color:#e8e2d9;}
:root[data-theme="dark"] .wbadge{background:rgba(196,153,58,.18);color:#c4993a;}
:root[data-theme="dark"] .mmeta .mchip{color:rgba(206,199,188,.5);}
:root[data-theme="dark"] .av{opacity:.9;}
:root[data-theme="dark"] .hbar{background:linear-gradient(90deg,#665e55,var(--teal) 40%,var(--rust) 70%,var(--gold));}
:root[data-theme="dark"] .ab{border-color:rgba(255,248,240,.1);background:rgba(255,248,240,.05);color:rgba(206,199,188,.75);}
:root[data-theme="dark"] .ab:hover{background:rgba(255,248,240,.12);color:#e8e2d9;}
:root[data-theme="dark"] .sensnote{background:rgba(255,248,240,.04);border-color:rgba(255,248,240,.08);color:rgba(206,199,188,.6);}

/* Theme toggle button */
.theme-toggle{position:absolute;top:1.2rem;right:0;width:36px;height:36px;border-radius:50%;border:1px solid var(--rule2);background:var(--card);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .15s;z-index:10;}
.theme-toggle:hover{background:var(--surf);border-color:var(--teal);}

/* Content warning styles */
.cw-bar{display:flex;align-items:center;gap:8px;padding:.65rem 1rem;background:var(--surf);border:1px solid var(--rule);border-radius:8px;margin-bottom:.7rem;font-size:.76rem;color:var(--muted);}
.cw-bar svg{width:14px;height:14px;flex-shrink:0;color:var(--gold);}
.cw-toggle{position:relative;width:36px;height:20px;background:var(--rule2);border-radius:10px;cursor:pointer;border:none;padding:0;transition:background .2s;flex-shrink:0;}
.cw-toggle.on{background:var(--teal);}
.cw-toggle::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s;}
.cw-toggle.on::after{transform:translateX(16px);}
.cw-blur{position:relative;}
.cw-blur.blurred .asbody{filter:blur(5px);user-select:none;pointer-events:none;}
.cw-blur.blurred::after{content:'Click to reveal';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);padding:8px 16px;background:var(--card);border:1px solid var(--rule);border-radius:6px;font-size:.76rem;color:var(--muted);cursor:pointer;z-index:5;box-shadow:0 2px 8px rgba(0,0,0,.08);}

/* Discussion guide styles */
.dg-age{display:inline-block;font-size:.62rem;padding:3px 10px;border-radius:20px;background:var(--sage-l);color:var(--sage);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.8rem;}
.dg-sub{font-family:var(--dp);font-size:.88rem;font-weight:600;color:var(--navy);margin-bottom:5px;margin-top:.9rem;}
.dg-sub:first-of-type{margin-top:0;}
.dg-list{margin:.3rem 0 0 1.2rem;font-size:.82rem;color:var(--ink);line-height:1.7;}
.dg-list li{margin-bottom:6px;}
.dg-warn{margin-top:1rem;padding:.7rem .9rem;background:var(--gold-l);border:1px solid rgba(154,123,47,.2);border-radius:6px;font-size:.76rem;color:var(--ink);line-height:1.6;}
.dg-warn strong{color:var(--gold);}

/* Export styles */
.export-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem;}
.export-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:1rem;border:1px solid var(--rule);border-radius:8px;background:var(--surf);cursor:pointer;transition:all .15s;font-family:var(--bd);}
.export-btn:hover{border-color:var(--teal);background:var(--card);}
.export-icon{font-family:var(--dp);font-size:1.1rem;font-weight:700;color:var(--teal);}
.export-fmt{font-size:.82rem;font-weight:600;color:var(--navy);}
.export-desc{font-size:.64rem;color:var(--faint);}

@media print{
  :root[data-theme="dark"]{--bg:#fff;--surf:#fff;--card:#fff;--navy:#1c2b3a;--ink:#2c3e50;--muted:#6b8094;--faint:#98afc0;--rule:rgba(28,43,58,0.1);}
  .theme-toggle{display:none!important;}
  .cw-bar{display:none!important;}
}

@media print{.toc,.toc-mob{display:none!important;}}

/* ===== Conflict Status + Disagreement Type Badges ===== */
.status-bar{display:flex;flex-wrap:wrap;gap:8px;margin:1rem 0 .5rem;align-items:center;}
.status-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:.74rem;font-weight:600;letter-spacing:.02em;}
.status-badge .traj-arrow{font-size:.85rem;line-height:1;}
.sb-active-crisis{background:rgba(192,57,43,.12);color:#c0392b;}
:root[data-theme="dark"] .sb-active-crisis{background:rgba(192,57,43,.2);color:#e74c3c;}
.sb-frozen-conflict{background:rgba(52,152,219,.12);color:#2980b9;}
:root[data-theme="dark"] .sb-frozen-conflict{background:rgba(52,152,219,.2);color:#5dade2;}
.sb-policy-deadlock{background:rgba(243,156,18,.12);color:#d4880f;}
:root[data-theme="dark"] .sb-policy-deadlock{background:rgba(243,156,18,.2);color:#f39c12;}
.sb-shifting-ground{background:rgba(230,126,34,.12);color:#d35400;}
:root[data-theme="dark"] .sb-shifting-ground{background:rgba(230,126,34,.2);color:#e67e22;}
.sb-resolution-trajectory{background:rgba(39,174,96,.12);color:#27ae60;}
:root[data-theme="dark"] .sb-resolution-trajectory{background:rgba(39,174,96,.2);color:#2ecc71;}
.dtype-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:.7rem;font-weight:500;background:var(--teal-l);color:var(--teal);letter-spacing:.01em;}
.status-reasoning{font-size:.74rem;color:var(--muted);margin:.3rem 0 .8rem;line-height:1.45;padding-left:2px;}

/* ===== Conflict Map ===== */
.conflict-map{width:100%;height:280px;border-radius:10px;margin:1rem 0;overflow:hidden;border:1px solid var(--rule);z-index:0;}
.conflict-map .leaflet-control-attribution{font-size:.58rem;background:rgba(255,255,255,.7)!important;}
:root[data-theme="dark"] .conflict-map .leaflet-control-attribution{background:rgba(30,27,24,.7)!important;color:#968e83;}
:root[data-theme="dark"] .conflict-map .leaflet-control-attribution a{color:#968e83;}

/* ===== Conflict Images ===== */
.conflict-img-section{margin:1rem 0;}
.conflict-img-wrap{position:relative;border-radius:10px;overflow:hidden;background:var(--surf);border:1px solid var(--rule);}
.conflict-img-wrap img{width:100%;max-height:320px;object-fit:cover;display:block;}
.conflict-img-attr{font-size:.62rem;color:var(--faint);padding:6px 10px;line-height:1.4;}
.conflict-img-attr a{color:var(--teal);text-decoration:none;}
.conflict-img-attr a:hover{text-decoration:underline;}
</style>
</head>
<body>
<a class="skipnav" href="#main-content">Skip to content</a>
<div id="app">
  <div id="ovlayer"></div>
  <header class="hdr" role="banner">
    <h1 onclick="location.hash='';renderGrid()" style="cursor:pointer">Solutions, Thoughts &amp; Ideas</h1>
    <div class="sub">Understanding every side of every conflict</div>
    <div class="hbar"></div>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" aria-label="Toggle dark mode">🌙</button>
  </header>
  <div class="authbar" id="authbar"></div>
  <main id="hview" role="main">
    <div class="sw" role="search">
      <input type="text" id="si" maxlength="200" placeholder="Search any conflict, policy, or global issue…" oninput="onSI()" aria-label="Search conflicts" />
      <span class="cc" id="cc"></span>
      <button id="sbtn" onclick="doSearch()">Analyze →</button>
    </div>
    <span class="hint" id="hint" aria-live="polite"></span>
    <div class="slbl" id="grid-label">Featured conflicts &amp; issues</div>
    <div id="grid-tabs-container"></div>
    <div class="cgrid" id="cgrid"></div>
  <div id="dyk" class="tidbit-feed"></div>
  <div class="suggest-box" style="margin-top:2rem;padding:1.2rem;background:var(--surf);border:1px solid var(--rule);border-radius:8px;text-align:center;">
    <p style="font-size:.85rem;color:var(--muted);margin-bottom:.6rem;">Don't see a topic you care about?</p>
    <div style="display:flex;gap:8px;max-width:400px;margin:0 auto;">
      <input type="text" id="suggest-input" maxlength="200" placeholder="Suggest a topic..." style="flex:1;padding:10px 12px;border:1px solid var(--rule);border-radius:6px;font-family:var(--bd);font-size:.82rem;color:var(--ink);background:var(--card);outline:none;min-height:44px;" aria-label="Suggest a topic" />
      <button onclick="submitSuggestion()" style="padding:10px 16px;background:var(--teal);color:#fff;border:none;border-radius:6px;font-family:var(--bd);font-size:.82rem;cursor:pointer;min-height:44px;white-space:nowrap;">Submit</button>
    </div>
    <p id="suggest-msg" style="font-size:.76rem;color:var(--faint);margin-top:.5rem;min-height:1em;"></p>
  </div>
  </main>
  <div id="dview" style="display:none;" id="main-content">
    <button class="back" id="bbtn" onclick="goHome()">← All conflicts</button>
    <nav class="toc" id="toc" role="navigation" aria-label="Table of contents"></nav>
    <div class="toc-mob" id="tocMob">
      <button class="toc-pill" id="tocPill" onclick="toggleTocMob()">Jump to section ▲</button>
      <div class="toc-mob-list" id="tocMobList"></div>
    </div>

<script>
/* ============================================================

let featuredTidbits = []; // didYouKnow facts from featured topics

/* ============================================================

let busy=false, ctrl=null, fromSrch=false, curTitle='';
const cache={};

let apiKey='';

// Theme

function renderAuthBar(){

  if(currentUser&&currentUser.verified){

    ab.innerHTML='<button class="authbtn" onclick="openSignUp()">Sign up</button><button class="authbtn" onclick="openSignIn()">Sign in</button>';

function signOut(){
  currentUser=null;saveUser();renderAuthBar();

/* ============================================================

let signupStep=1;

function openSignUp(){
  signupStep=1;pendingUser={};

}

function renderSignUpModal(){
  const s1=signupStep===1?'active':signupStep>1?'done':'';

  const s3=signupStep===3?'active':'';

  let body='';
  if(signupStep===1){
    body='<p style="font-size:.82rem;color:var(--faint);margin:0 0 1rem;">Get a weekly digest of the most-searched topics and balanced analyses, delivered every Monday. No spam, unsubscribe anytime.</p><label for="su-name">Display name</label><input type="text" id="su-name" placeholder="Your name" maxlength="60" /><label for="su-email">Email address</label><input type="email" id="su-email" placeholder="you@example.com" /><div class="merr" id="su-err"></div><button class="mbtn" onclick="signUpStep1()">Continue</button>';
  } else if(signupStep===2){
    body='<p>We sent a 6-digit verification code to <strong>'+eh(pendingUser.email)+'</strong>. Check your inbox (and spam).</p><label for="su-code">Verification code</label><input type="text" id="su-code" placeholder="000000" maxlength="6" /><div class="merr" id="su-err"></div><button class="mbtn" onclick="signUpStep2()">Verify</button><p class="note" style="margin-top:.5rem;">Demo mode: your code is <strong id="su-reveal"></strong></p>';
  } else {
    body='<div class="mok">Your account is verified! You can now participate in discussions.</div><button class="mbtn" onclick="closeOv(\'auov\')">Done</button>';
  }

  mkOv('auov','<div class="modal" role="dialog" aria-modal="true"><h3>Create your account</h3><div class="vsteps"><div class="vstep '+s1+'">1. Details</div><div class="vstep '+s2+'">2. Verify</div><div class="vstep '+s3+'">3. Done</div></div>'+body+'<br><button class="mcl" onclick="closeOv(\'auov\')">Cancel</button></div>');

  if(signupStep===2){
    // Generate demo code
    const code=String(Math.floor(100000+Math.random()*900000));
    pendingUser.code=code;
    setTimeout(()=>{const r=document.getElementById('su-reveal');if(r)r.textContent=code;},50);
  }
}

function signUpStep1(){
  const name=(document.getElementById('su-name')||{}).value?.trim();
  const email=(document.getElementById('su-email')||{}).value?.trim();
  const err=document.getElementById('su-err');
  if(!name||name.length<2){if(err)err.textContent='Please enter a name (2+ characters).';return;}
  if(!email||!email.includes('@')||!email.includes('.')){if(err)err.textContent='Please enter a valid email address.';return;}
  pendingUser.name=name;pendingUser.email=email;
  signupStep=2;renderSignUpModal();
}

function signUpStep2(){
  const code=(document.getElementById('su-code')||{}).value?.trim();
  const err=document.getElementById('su-err');
  if(!code||code!==pendingUser.code){if(err)err.textContent='Invalid code. Please try again.';return;}
  currentUser={name:pendingUser.name,email:pendingUser.email,verified:true};
  saveUser();
  signupStep=3;renderSignUpModal();
  renderAuthBar();
  // Re-render detail view
  const dv=document.getElementById('dview');

    const ckey=ck(curTitle);

function openSignIn(){

function doSignIn(){
  const email=(document.getElementById('si-email')||{}).value?.trim();
  const err=document.getElementById('si-err');
  if(!email||!email.includes('@')){if(err)err.textContent='Please enter a valid email.';return;}

  const name=email.split('@')[0].replace(/[._]/g,' ').replace(/\b\w/g,l=>l.toUpperCase());
  currentUser={name,email,verified:true};
  saveUser();renderAuthBar();closeOv('auov');
  const dv=document.getElementById('dview');
  if(dv.style.display!=='none'){
    const ckey=ck(curTitle);

/* ============================================================

   ============================================================ */
function onSI(){
  const v=document.getElementById('si').value;
  const cc=document.getElementById('cc');
  if(v.length>150){cc.style.display='';cc.textContent=(200-v.length)+' left';}else{cc.style.display='none';}
  if(v.length>0&&v.length<4)document.getElementById('hint').textContent='Enter at least 4 characters';
  else document.getElementById('hint').textContent='';
}

function renderGrid(){
  const hl={critical:'Critical intensity',high:'High intensity',med:'Medium intensity',medium:'Medium intensity',low:'Lower intensity'};
  const hmap={critical:'c',high:'h',med:'h',medium:'m',low:'l'};

  // Build toggle tabs
  const trendCount = trendingTopics.length;
  let tabsHtml = '';
  if(trendCount > 0) {
    tabsHtml = `<div class="grid-tabs">
      <button class="grid-tab ${homepageMode==='featured'?'active':''}" onclick="homepageMode='featured';renderGrid();">Featured</button>
      <button class="grid-tab ${homepageMode==='trending'?'active':''}" onclick="homepageMode='trending';renderGrid();">Trending <span class="trend-count">${trendCount}</span></button>
    </div>`;
  }

  let cardsHtml = '';
  if(homepageMode === 'featured' || trendCount === 0) {
    if (featuredTopics.length === 0) {
      cardsHtml = `<div style="text-align:center;padding:2rem;color:var(--faint);">
        <div class="spin" style="margin:0 auto 1rem;"></div>
        <p>Loading featured topics...</p>
      </div>`;
    } else {
      cardsHtml = featuredTopics.map(c=>{
        const hc = hmap[c.intensity] || 'm';
        const tags = (c.tags||[]).slice(0,3);
        return `<div class="cc2" tabindex="0" role="button" aria-label="Analyze ${eh(c.title)}"
          onclick="go(null,'${eh(c.title)}',false)"
          onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();go(null,'${eh(c.title)}',false);}">
          <div class="hrow"><div class="hrowl"><div class="hdot h${hc}"></div><span class="htxt">${hl[c.intensity]||'Medium intensity'}</span></div><span class="rdtime">${c.readTime||7} min read</span></div>
          <h3>${eh(c.title)}</h3>
          <p>${eh(c.summary||'')}</p>
          <div class="ctags">${tags.map(t=>`<span class="ctag${t==='Wedge Issue'?' ctag-w':''}">${t}</span>`).join('')}</div>
        </div>`;
      }).join('');
    }
  } else {
    cardsHtml = trendingTopics.map(t=>{
      const hc = hmap[t.intensity] || 'm';
      const tags = (t.tags||[]).slice(0,3);
      return `<div class="cc2" tabindex="0" role="button" aria-label="Analyze ${eh(t.title)}"
        onclick="go(null,'${eh(t.title)}',false)"
        onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();go(null,'${eh(t.title)}',false);}">
        <div class="hrow"><div class="hrowl"><div class="hdot h${hc}"></div><span class="htxt">${hl[t.intensity]||'Medium intensity'}</span></div><span class="rdtime">${t.readTime||7} min read</span></div>
        <h3>${eh(t.title)}</h3>
        <p>${eh(t.summary||'')}</p>
        <div class="ctags">${tags.map(tg=>`<span class="ctag${tg==='Wedge Issue'?' ctag-w':''}">${tg}</span>`).join('')}
          <span class="ctag" style="background:var(--teal-l);color:var(--teal);">${t.count} searches</span>
        </div>
      </div>`;
    }).join('');
  }

  const gridEl = document.getElementById('cgrid');
  // Insert tabs before grid if not already present
  let tabContainer = document.getElementById('grid-tabs-container');
  if(!tabContainer) {
    tabContainer = document.createElement('div');
    tabContainer.id = 'grid-tabs-container';
    gridEl.parentElement.insertBefore(tabContainer, gridEl);
  }
  tabContainer.innerHTML = tabsHtml;
  gridEl.innerHTML = cardsHtml;
}

// Fetch featured topics from backend (with localStorage fallback for instant load)
async function fetchFeatured(){
  // Show cached featured topics instantly while fresh ones load
  try {
    const cached = localStorage.getItem('sti-featured');
    if(cached) {
      const parsed = JSON.parse(cached);
      if(parsed.topics && parsed.topics.length > 0) {
        featuredTopics = parsed.topics;
        featuredTidbits = parsed.tidbits || [];
        renderGrid();
      }
    }
  } catch(e) {}

  // Fetch fresh featured topics
  try {
    const res = await fetch(API_BASE + '/featured');
    if(!res.ok) return;
    const data = await res.json();
    if(data.topics && data.topics.length > 0) {
      featuredTopics = data.topics;
      featuredTidbits = data.tidbits || [];
      localStorage.setItem('sti-featured', JSON.stringify(data));
      renderGrid();
      renderDYK();
    }
  } catch(e) {
    console.log('Featured fetch skipped:', e.message);
  }
}

// Fetch trending topics from backend
async function fetchTrending(){
  try {
    const res = await fetch(API_BASE + '/trending');
    if(!res.ok) return;
    const data = await res.json();
    trendingTopics = (data.topics || []).filter(t => t.count >= 2); // Only show topics searched 2+ times
    renderGrid();
  } catch(e) {
    console.log('Trending fetch skipped:', e.message);
  }
}

/* ============================================================
   NAVIGATION
   ============================================================ */

/* ============================================================
   TIDBIT FEED
   ============================================================ */
// Tidbits are now sourced dynamically from API responses (didYouKnow field)

let tidbitIdx=0;
function renderDYK(){
  const container=document.getElementById('dyk');
  // Collect all tidbits from featured data + any cached API responses
  const tidbits=[];
  // Featured tidbits (from seed-featured endpoint)
  featuredTidbits.forEach(t=>tidbits.push(t));
  // Also pull didYouKnow from any cached API responses in this session
  for(const key in cache){
    const d=cache[key];
    if(d&&d.didYouKnow)tidbits.push({topic:d.title||key,text:d.didYouKnow});
  }
  // Shuffle
  for(let i=tidbits.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[tidbits[i],tidbits[j]]=[tidbits[j],tidbits[i]];}

  const svgIcon='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>';

  let html='<div class="tidbit-feed-hdr"><span class="tidbit-feed-lbl">'+svgIcon+' Did you know?</span>';
  html+='<div class="tidbit-feed-nav"><button class="tidbit-nav-btn" onclick="scrollTidbits(-1)" aria-label="Previous tidbits">&#8249;</button><button class="tidbit-nav-btn" onclick="scrollTidbits(1)" aria-label="Next tidbits">&#8250;</button></div></div>';
  html+='<div class="tidbit-track"><div class="tidbit-scroll" id="tidbit-scroll">';
  tidbits.forEach(t=>{
    html+='<div class="tidbit-card" onclick="go(null,\''+eh(t.topic).replace(/'/g,"\\'")+'\',false)" role="button" tabindex="0" aria-label="Learn more about '+eh(t.topic)+'"><div class="tidbit-topic">'+eh(t.topic)+'</div><p>'+eh(t.text)+'</p></div>';
  });
  html+='</div></div>';
  container.innerHTML=html;
  tidbitIdx=0;
}

function scrollTidbits(dir){
  const track=document.getElementById('tidbit-scroll');
  if(!track)return;
  const cards=track.querySelectorAll('.tidbit-card');
  if(!cards.length)return;
  const cardW=cards[0].offsetWidth+10; // width + gap
  const visibleW=track.parentElement.offsetWidth;
  const maxIdx=Math.max(0,cards.length-Math.floor(visibleW/cardW));
  tidbitIdx=Math.max(0,Math.min(maxIdx,tidbitIdx+dir));
  track.style.transform='translateX(-'+tidbitIdx*cardW+'px)';
}
function goHome(){
  document.getElementById('hview').style.display='';
  document.getElementById('dview').style.display='none';
  if(fromSrch)setTimeout(()=>document.getElementById('si').focus(),50);
  window.scrollTo(0,0);
}

function doSearch(){
  const q=document.getElementById('si').value.trim();
  if(!q||q.length<4){document.getElementById('hint').textContent='Please enter at least 4 characters.';return;}
  go(null,q,true);
}
document.getElementById('si').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});

/* ============================================================
   MAIN GO
   ============================================================ */
async function go(id,title,fs){
  if(busy)return;
  fromSrch=!!fs;curTitle=title;
  const ckey=ck(title);
  document.getElementById('hview').style.display='none';
  document.getElementById('dview').style.display='';
  document.getElementById('bbtn').textContent=fs?'← Back to search':'← All conflicts';

  if(cache[ckey]){renderDetail(cache[ckey],title);window.scrollTo(0,0);return;}

  // All topics load from the API (cached in Netlify Blobs after first generation)
  document.getElementById('dc').innerHTML=`<div class="loading"><div class="spin"></div><p>Analyzing "${eh(title)}"...</p><p id="load-stage" style="font-size:.72rem;color:var(--faint);margin-top:8px;">Searching for current headlines...</p></div>`;
  // Staged progress messages
  const stages=['Searching for current headlines...','Researching multiple perspectives...','Analyzing stakeholders & power dynamics...','Building balanced analysis...','Almost there — formatting results...'];
  let si=0;
  window._stageTimer=setInterval(()=>{si++;if(si<stages.length){const el=document.getElementById('load-stage');if(el)el.textContent=stages[si];}else clearInterval(window._stageTimer);},3000);
  window.scrollTo(0,0);
  busy=true;document.getElementById('sbtn').disabled=true;
  if(ctrl)ctrl.abort();ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(),45000);
  try{
    const res=await fetch(API_BASE+'/search',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      signal:ctrl.signal,
      body:JSON.stringify({title})
    });
    clearTimeout(timer);if(window._stageTimer)clearInterval(window._stageTimer);
    const p=await res.json();
    if(p.error)throw new Error(p.error);
    if(p.isValidTopic===false){document.getElementById('dc').innerHTML='<div class="nc"><strong>Not a recognized conflict topic.</strong> '+eh(p.invalidReason||'Please search for a specific geopolitical conflict or policy debate.')+'</div>';return;}
    const safe={title:p.title||title,isWedge:!!p.isWedge,intensity:p.intensity||'medium',region:p.region||'',sensitivity:p.sensitivity||null,lastVerified:p.lastVerified||'',statusAssessment:p.statusAssessment||null,disagreementType:p.disagreementType||null,geography:p.geography||null,safeImageQuery:p.safeImageQuery||'',keyDates:Array.isArray(p.keyDates)?p.keyDates:[],situation:p.situation||'',sides:Array.isArray(p.sides)?p.sides:[],importantDistinction:p.importantDistinction||'',missingVoices:p.missingVoices||'',powerBrokers:Array.isArray(p.powerBrokers)?p.powerBrokers:[],gameTheory:p.gameTheory||'',keyLeaders:Array.isArray(p.keyLeaders)?p.keyLeaders:[],resolutionPaths:Array.isArray(p.resolutionPaths)?p.resolutionPaths:[],historicalPrecedent:p.historicalPrecedent||'',sources:p.sources||[],didYouKnow:p.didYouKnow||'',discussionGuide:p.discussionGuide||null,organizations:p.organizations||[],actions:p.actions||[],quickTake:p.quickTake||'',pullQuote:p.pullQuote||''};
    cache[ckey]=safe;renderDetail(safe,title);
    // Refresh trending in background (new search may have changed rankings)
    fetchTrending();
  }catch(e){
    clearTimeout(timer);if(window._stageTimer)clearInterval(window._stageTimer);
    const isTO=e.name==='AbortError';
    const errMsg=isTO?'This is taking longer than expected. The servers may be busy — please try again.':'Something went wrong loading this analysis. This could be a temporary issue.';
    document.getElementById('dc').innerHTML='<div class="err" style="text-align:center;padding:2rem 1rem;"><div style="font-size:1.5rem;margin-bottom:.8rem;">😕</div><strong style="font-size:.95rem;">'+errMsg+'</strong><p style="font-size:.78rem;color:var(--faint);margin:.6rem 0;">'+(isTO?'':'Error: '+eh(e.message))+'</p><div style="display:flex;gap:8px;justify-content:center;margin-top:1rem;"><button class="retry" style="padding:10px 20px;min-height:44px;" onclick="go('+(id?'\''+eh(id)+'\'':'null')+',\''+eh(title).replace(/'/g,"\\'")+'\','+fs+')">Try again</button><button class="retry" style="padding:10px 20px;min-height:44px;background:var(--surf);color:var(--ink);border:1px solid var(--rule);" onclick="goHome()">Back to topics</button></div></div>';
  }finally{busy=false;document.getElementById('sbtn').disabled=false;}
}

/* ============================================================

   ============================================================ */
function renderDetail(d,st){
  curTitle=d.title;
  const dc=document.getElementById('dc');
  try{
    const ic=d.intensity==='critical'?'#c0392b':d.intensity==='high'?'var(--rust)':d.intensity==='medium'?'var(--gold)':'var(--sage)';
    const il=d.intensity==='critical'?'Critical intensity':d.intensity==='high'?'High intensity':d.intensity==='medium'?'Medium intensity':'Lower intensity';

    let h='<div class="mast"><h2>'+eh(d.title)+'</h2>'+(d.isWedge?'<span class="wbadge">Wedge issue</span>':'')+

      '<div class="abar">'+

      '<button class="ab" onclick="openShare()" aria-label="Share"><svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>Share</button>'+

function sec(num,title,content,open,conflictTitle){
  const uid='s'+Math.random().toString(36).slice(2,8);
  const stKey=ck(conflictTitle||'')+'-'+num;
  const isOpen=sectionState[stKey]!==undefined?sectionState[stKey]:!!open;
  return '<div class="asec"><div class="ash" onclick="ts(\''+uid+'\',\''+stKey+'\')" role="button" tabindex="0" aria-expanded="'+isOpen+'" onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();ts(\''+uid+'\',\''+stKey+'\');}"><div class="ashl"><span class="asn">'+num+'</span><h4>'+title+'</h4></div><span class="chv" id="cv_'+uid+'">'+(isOpen?'▲':'▼')+'</span></div><div class="asbody'+(isOpen?' open':'')+'" id="'+uid+'">'+content+'</div></div>';
}

function ts(uid,stKey){
  const b=document.getElementById(uid),c=document.getElementById('cv_'+uid);
  b.classList.toggle('open');
  const isOpen=b.classList.contains('open');
  c.textContent=isOpen?'▲':'▼';
  // Update aria
  c.closest('.ash')?.setAttribute('aria-expanded',isOpen);
  if(stKey)sectionState[stKey]=isOpen;
}

function buildCS(ckey, sides){
  const store=lcs();const list=store[ckey]||[];
  const isAuth=currentUser&&currentUser.verified;

  // Perspective options from sides
  let perspOpts='<option value="">Perspective (optional)</option><option value="Observer">Neutral observer</option>';
  if(sides&&sides.length){sides.forEach(s=>{perspOpts+='<option value="'+eh(s.name)+'">'+eh(s.name)+'</option>';});}
  perspOpts+='<option value="Other">Other</option>';

  // Guidelines
  let guidelines='<div class="cguidelines"><strong>Community values</strong><ul><li>Assume good intent — we\'re all trying to understand</li><li>Represent your own views authentically</li><li>You don\'t have to agree — you have to be curious</li><li>No personal attacks, spam, or dogpiling</li></ul></div>';

  // Contextual comment placeholder
  let placeholder='Share your perspective... All viewpoints welcome.';
  if(sides&&sides.length){
    const representedPersp=new Set(list.map(c=>c.perspective).filter(Boolean));
    const missing=sides.filter(s=>!representedPersp.has(s.name));
    if(missing.length>0&&missing.length<sides.length){
      placeholder='The "'+missing[0].name+'" perspective hasn\'t been shared yet. What would they say?';
    }
  }

  // Perspective breadth dots
  let pdots='';
  if(sides&&sides.length){
    const dotColors=['var(--rust)','var(--teal)','var(--sage)','var(--gold)'];
    const representedPersp=new Set(list.map(c=>c.perspective).filter(Boolean));
    pdots='<div class="persp-dots">';
    sides.forEach((s,i)=>{
      const has=representedPersp.has(s.name);
      pdots+='<span class="persp-dot'+(has?' filled':'')+'" style="'+(has?'background:'+dotColors[i%4]:'')+'" title="'+eh(s.name)+(has?' (represented)':' (not yet represented)')+'"></span>';
    });
    pdots+='</div>';
  }

  // Comment form or auth gate
  let form='';
  if(isAuth){
    form='<div class="cform"><textarea id="cta_'+ckey+'" maxlength="1000" placeholder="'+eh(placeholder)+'" oninput="ucr(\''+ckey+'\')"></textarea><div class="cfmeta"><select id="cps_'+ckey+'">'+perspOpts+'</select><span class="crem" id="crm_'+ckey+'">1000</span><span class="crate" id="crt_'+ckey+'"></span><button class="csub" id="csb_'+ckey+'" onclick="postC(\''+ckey+'\')">Post comment</button></div></div>';
  } else {
    form='<div class="cauth-gate"><p>Join the discussion — sign up or sign in to comment.<br>Verified accounts help keep this space thoughtful and spam-free.</p><button class="authbtn" onclick="openSignUp()">Sign up to comment</button></div>';
  }

  return '<div class="csec" id="csec_'+ckey+'"><div class="chd"><h4>Discussion</h4><span style="font-size:.7rem;background:var(--teal);color:#fff;padding:2px 8px;border-radius:10px;margin-left:8px;">Coming soon</span></div><div style="padding:1rem;font-size:.85rem;color:var(--faint);line-height:1.6;"><p style="margin:0;">Community discussion is on the way. Soon you\'ll be able to share perspectives, represent underheard viewpoints, and engage in structured dialogue across all sides of every topic.</p></div></div>';
}

function buildCI(c,i,ckey){
  const init=(c.name||'A').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  const lk=ckey+'-'+i;const isL=liked.has(lk);const isF=flagged.has(lk);
  let meta='<div class="cimeta"><div class="av" style="background:'+AVCOLS[i%AVCOLS.length]+';">'+eh(init)+'</div><span class="cauth-name">'+eh(c.name||'Anonymous')+'</span>';
  if(c.verified) meta+='<span class="cvbadge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>Verified</span>';
  if(c.perspective) meta+='<span class="cperspective">'+eh(c.perspective)+'</span>';
  meta+='<span class="ctime">'+eh(c.time)+'</span></div>';

  let actions='<div class="cactions"><button class="clk'+(isL?' liked':'')+'" onclick="likeC(\''+ckey+'\','+i+')" aria-label="Mark as helpful">'+(isL?'&#9829;':'&#9825;')+' '+(c.likes||0)+' helpful</button>';
  actions+='<button class="cflag'+(isF?' flagged':'')+'" onclick="flagC(\''+ckey+'\','+i+')" aria-label="Flag comment">'+(isF?'Flagged':'Flag')+'</button></div>';

  return '<div class="ci">'+meta+'<div class="ctxt2">'+eh(c.text)+'</div>'+actions+'</div>';
}

function ucr(ckey){const ta=document.getElementById('cta_'+ckey),rm=document.getElementById('crm_'+ckey);if(ta&&rm)rm.textContent=1000-ta.value.length;}

function postC(ckey){
  if(!currentUser||!currentUser.verified)return;
  const ta=document.getElementById('cta_'+ckey);
  const ps=document.getElementById('cps_'+ckey);
  const rt=document.getElementById('crt_'+ckey);
  if(!ta)return;
  const txt=ta.value.trim();
  if(txt.length<3||txt.length>1000)return;

  // Rate limit check
  const now=Date.now();
  if(now-lastPostTime<RATE_LIMIT_MS){
    const secs=Math.ceil((RATE_LIMIT_MS-(now-lastPostTime))/1000);
    if(rt)rt.textContent='Please wait '+secs+'s before posting again.';
    return;
  }

  const store=lcs();if(!store[ckey])store[ckey]=[];
  const time=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'})+' '+new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  const perspective=ps?ps.value:'';
  store[ckey].push({name:currentUser.name,text:txt,time,likes:0,verified:true,perspective});
  scs(store);
  lastPostTime=Date.now();
  ta.value='';if(ps)ps.value='';ucr(ckey);if(rt)rt.textContent='';
  refreshCL(ckey,store);
}

function likeC(ckey,idx){
  const lk=ckey+'-'+idx;if(liked.has(lk))return;
  liked.add(lk);saveLiked();
  const store=lcs();
  if(store[ckey]&&store[ckey][idx]){store[ckey][idx].likes=(store[ckey][idx].likes||0)+1;scs(store);refreshCL(ckey,store);}
}

function flagC(ckey,idx){
  const lk=ckey+'-'+idx;if(flagged.has(lk))return;
  flagged.add(lk);saveFlagged();refreshCL(ckey,lcs());
}

function refreshCL(ckey,store){
  const list=store[ckey]||[];
  const cnt=document.getElementById('ccnt_'+ckey);if(cnt)cnt.textContent=list.length+' comment'+(list.length!==1?'s':'');
  const cl=document.getElementById('cl_'+ckey);
  if(cl)cl.innerHTML=list.length?'<div class="clist">'+list.map((c,i)=>buildCI(c,i,ckey)).join('')+'</div>':'<div class="noc">No comments yet.</div>';
}

function mkOv(id,html){
  let ov=document.getElementById(id);
  if(!ov){ov=document.createElement('div');ov.className='ovwrap';ov.id=id;document.getElementById('ovlayer').appendChild(ov);}
  ov.innerHTML=html;ov.classList.add('open');
  ov.addEventListener('click',function(e){if(e.target===ov)closeOv(id);});
  ov.addEventListener('keydown',function(e){
    if(e.key==='Escape'){closeOv(id);return;}
    if(e.key!=='Tab')return;
    const foc=[...ov.querySelectorAll('button,input,textarea,select')];if(!foc.length)return;
    if(e.shiftKey){if(document.activeElement===foc[0]){e.preventDefault();foc[foc.length-1].focus();}}
    else{if(document.activeElement===foc[foc.length-1]){e.preventDefault();foc[0].focus();}}
  });
  setTimeout(()=>{const f=ov.querySelector('input,button');if(f)f.focus();},30);
}

function doExport(fmt){
  const ckey=ck(curTitle);
  const d=cache[ckey];
  if(!d)return;
  let content='',filename='',mime='';

  if(fmt==='json'){
    content=JSON.stringify(d,null,2);
    filename=ckey+'.json';
    mime='application/json';
  } else if(fmt==='md'){
    let md='# '+d.title+'\n\n';
    if(d.quickTake)md+='> '+d.quickTake+'\n\n';
    md+='**Region:** '+d.region+' | **Intensity:** '+d.intensity;
    if(d.lastVerified)md+=' | **Last verified:** '+d.lastVerified;
    md+='\n\n';
    if(d.situation){md+='## The Situation\n\n'+d.situation.split('\n').join('\n\n')+'\n\n';}
    if(d.sides&&d.sides.length){
      md+='## The Sides\n\n';
      d.sides.forEach(s=>{md+='### '+s.name+'\n\n'+s.coreBeliefs+'\n\n';if(s.keyFigures)md+='*Key figures: '+s.keyFigures+'*\n\n';});
    }
    if(d.importantDistinction)md+='> **Important distinction:** '+d.importantDistinction+'\n\n';
    if(d.powerBrokers&&d.powerBrokers.length){
      md+='## Power Brokers\n\n';
      d.powerBrokers.forEach((b,i)=>{md+=(i+1)+'. **'+b.name+'** — '+b.description+'\n';});
      md+='\n';
    }
    if(d.gameTheory){md+='## Game Theory & Strategic Dynamics\n\n'+d.gameTheory.split('\n').join('\n\n')+'\n\n';}
    if(d.keyLeaders&&d.keyLeaders.length){
      md+='## Key Leaders\n\n';
      d.keyLeaders.forEach(l=>{md+='- **'+l.name+'** ('+l.role+'): '+l.stake+'\n';});
      md+='\n';
    }
    if(d.resolutionPaths&&d.resolutionPaths.length){
      md+='## Paths to Resolution\n\n';
      d.resolutionPaths.forEach((r,i)=>{md+=(i+1)+'. **'+r.title+'** — '+r.description+'\n';});
      md+='\n';
    }
    if(d.historicalPrecedent)md+='## Historical Precedent\n\n'+d.historicalPrecedent+'\n\n';
    if(d.sources&&d.sources.length){
      md+='## Sources\n\n';
      d.sources.forEach((s,i)=>{md+=(i+1)+'. '+s.org+' ('+s.date+') — '+s.text+(s.url?' [Link]('+s.url+')':'')+'\n';});
    }
    md+='\n---\n*Exported from Solutions, Thoughts & Ideas*\n';
    content=md;
    filename=ckey+'.md';
    mime='text/markdown';
  } else if(fmt==='csv'){
    let rows=[['Side','Core Beliefs','Key Figures']];
    if(d.sides)d.sides.forEach(s=>{rows.push([s.name,s.coreBeliefs,s.keyFigures||'']);});
    content=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
    filename=ckey+'-sides.csv';
    mime='text/csv';
  }

  const blob=new Blob([content],{type:mime});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
  closeOv('exov');
}

async function flagOutdated(){
  if(!curTitle)return;
  const btn=document.getElementById('outdatedBtn');
  if(btn){btn.disabled=true;btn.textContent='Flagging...';}
  try{
    const res=await fetch(API_BASE+'/flag-outdated',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:curTitle})});
    const data=await res.json();
    if(data.refreshQueued){
      if(btn){btn.textContent='Refresh queued!';btn.style.color='var(--sage)';}
      // Clear local cache so next load fetches fresh
      delete cache[ck(curTitle)];
    } else {
      if(btn)btn.textContent=data.message||'Flagged!';
    }
  }catch(e){
    if(btn)btn.textContent='Error — try again';
  }
  setTimeout(()=>{if(btn){btn.disabled=false;btn.innerHTML='<svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Outdated?';}},4000);
}

const TOC_SECTIONS=[
  {num:'00',title:'Key dates'},
  {num:'01',title:'The situation'},
  {num:'02',title:'The sides'},
  {num:'03',title:'Power brokers'},
  {num:'04',title:'Game theory'},
  {num:'05',title:'Paths to resolution'},
  {num:'06',title:'What you can do'},
  {num:'07',title:'Sources & references'}
];

function initTOC(){
  // Desktop TOC
  const toc=document.getElementById('toc');
  if(!toc)return;
  let tocHtml='';
  TOC_SECTIONS.forEach(s=>{
    tocHtml+='<button class="toc-item" onclick="scrollToSection(\''+s.num+'\')" role="link"><span class="toc-num">'+s.num+'</span>'+s.title+'</button>';
  });
  toc.innerHTML=tocHtml;
  toc.classList.add('visible');

  // Mobile TOC
  const mobList=document.getElementById('tocMobList');
  if(!mobList)return;
  let mobHtml='';
  TOC_SECTIONS.forEach(s=>{
    mobHtml+='<button class="toc-mob-item" onclick="scrollToSection(\''+s.num+'\');toggleTocMob();">'+s.num+': '+s.title+'</button>';
  });
  mobList.innerHTML=mobHtml;

  // Setup IntersectionObserver for active state
  setupTOCObserver();
}

function toggleTocMob(){
  const list=document.getElementById('tocMobList');
  if(!list)return;
  list.classList.toggle('open');
}

function scrollToSection(num){
  const sections=document.querySelectorAll('[id^="s"]');
  for(const sec of sections){
    const header=sec.previousElementSibling;
    if(!header)continue;
    const numEl=header.querySelector('.asn');
    if(numEl&&numEl.textContent===num){
      sec.parentElement.scrollIntoView({behavior:'smooth',block:'start'});
      return;
    }
  }
}

function setupTOCObserver(){
  const observer=new IntersectionObserver((entries)=>{
    let visibleNum=null;
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        const header=entry.target.previousElementSibling;
        if(header){
          const numEl=header.querySelector('.asn');
          if(numEl)visibleNum=numEl.textContent;
        }
      }
    });
    if(visibleNum){
      const tocItems=document.querySelectorAll('.toc-item,.toc-mob-item');
      tocItems.forEach(item=>{
        const hasNum=(item.textContent||'').includes(visibleNum);
        if(hasNum)item.classList.add('active');
        else item.classList.remove('active');
      });
    }
  },{threshold:0.3});

  const sections=document.querySelectorAll('[id^="s"]');
  sections.forEach(sec=>observer.observe(sec));
}

// Wikimedia Commons image fetcher with content safety filter
const IMG_BLOCKED_CATS=/casualt|dead bod|graphic|gore|nsfw|execution|massacre|torture|wound|injur|autopsy|crime scene/i;
async function fetchWikimediaImage(query){
  const container=document.getElementById('conflict-img');
  if(!container)return;
  try{
    const url='https://commons.wikimedia.org/w/api.php?action=query&generator=search&gsrsearch='+encodeURIComponent(query)+'&gsrlimit=5&gsrnamespace=6&prop=imageinfo&iiprop=url|extmetadata&iiurlwidth=800&format=json&origin=*';
    const res=await fetch(url);
    if(!res.ok)return;
    const data=await res.json();
    if(!data.query||!data.query.pages)return;
    const pages=Object.values(data.query.pages);
    for(const page of pages){
      if(!page.imageinfo||!page.imageinfo[0])continue;
      const info=page.imageinfo[0];
      const meta=info.extmetadata||{};
      // Content safety filter: check categories
      const cats=(meta.Categories?meta.Categories.value:'')||'';
      if(IMG_BLOCKED_CATS.test(cats))continue;
      // License check
      const license=(meta.LicenseShortName?meta.LicenseShortName.value:'')||'';
      if(!license)continue;
      const okLicense=/cc|public domain|pd|gfdl/i.test(license);
      if(!okLicense)continue;
      // We have a safe, licensed image
      const thumbUrl=info.thumburl||info.url;
      const title=(meta.ObjectName?meta.ObjectName.value:page.title.replace('File:',''))||'Image';
      const artist=(meta.Artist?meta.Artist.value.replace(/<[^>]+>/g,''):'Unknown').slice(0,80);
      const descUrl=info.descriptionurl||'';
      container.innerHTML='<div class="conflict-img-wrap"><img src="'+eh(thumbUrl)+'" alt="'+eh(title)+'" loading="lazy"><div class="conflict-img-attr">'+eh(title)+' by '+eh(artist)+' · '+eh(license)+(descUrl?' · <a href="'+eh(descUrl)+'" target="_blank" rel="noopener">Wikimedia Commons</a>':'')+'</div></div>';
      return;
    }
    // No safe image found — just hide the section
    container.remove();
  }catch(e){container.remove();}
}

async function fetchNews(topic) {
  const feed = document.getElementById('news-feed');
  if(!feed) return;
  try {
    const res = await fetch(API_BASE + '/news?topic=' + encodeURIComponent(topic));
    if(!res.ok) throw new Error('News unavailable');
    const data = await res.json();
    if(!data.articles || data.articles.length === 0) {
      feed.innerHTML = '<p class="news-empty">No recent headlines found for this topic.</p>';
      return;
    }
    feed.innerHTML = data.articles.map(a => `
      <a class="news-item" href="${eh(a.link)}" target="_blank" rel="noopener">
        <div class="news-meta"><span class="news-source">${eh(a.source)}</span><span class="news-time">${eh(a.timeAgo)}</span></div>
        <div class="news-title">${eh(a.title)}</div>
      </a>
    `).join('');
  } catch(e) {
    feed.innerHTML = '<p class="news-empty">Could not load news. <button class="retry" onclick="fetchNews(\'' + eh(topic) + '\')">Retry</button></p>';
  }
}

// Suggest a Topic
async function submitSuggestion() {
  const input = document.getElementById('suggest-input');
  const msg = document.getElementById('suggest-msg');
  const topic = input.value.trim();
  if (!topic || topic.length < 4) { msg.textContent = 'Please enter at least 4 characters.'; msg.style.color = 'var(--rust)'; return; }
  msg.textContent = 'Submitting...'; msg.style.color = 'var(--faint)';
  try {
    const res = await fetch(API_BASE + '/suggest', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ topic }) });
    const data = await res.json();
    if (res.ok) { msg.textContent = 'Thanks for your suggestion!'; msg.style.color = 'var(--teal)'; input.value = ''; }
    else { msg.textContent = data.error || 'Something went wrong.'; msg.style.color = 'var(--rust)'; }
  } catch (e) { msg.textContent = 'Could not submit. Please try again.'; msg.style.color = 'var(--rust)'; }
}

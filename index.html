<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solutions, Thoughts & Ideas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f0ede8;--surf:#faf8f4;--card:#fff;
  --navy:#1c2b3a;--teal:#1e6b72;--teal-l:#e8f4f5;
  --rust:#b54a2a;--rust-l:#faf0ec;
  --gold:#9a7b2f;--gold-l:#faf5e8;
  --sage:#3a6b4a;--sage-l:#eaf4ed;
  --ink:#2c3e50;--muted:#6b8094;--faint:#98afc0;
  --rule:rgba(28,43,58,0.1);--rule2:rgba(28,43,58,0.2);
  --dp:'Playfair Display',Georgia,serif;
  --bd:'Source Sans 3',sans-serif;
}
:root[data-theme="dark"]{
  --bg:#1a1d23;--surf:#22262e;--card:#2a2e37;
  --navy:#e8ecf1;--teal:#5cc4cc;--teal-l:rgba(92,196,204,.12);
  --rust:#e87c5c;--rust-l:rgba(232,124,92,.1);
  --gold:#d4a94e;--gold-l:rgba(212,169,78,.1);
  --sage:#6bbd80;--sage-l:rgba(107,189,128,.1);
  --ink:#d0d5dd;--muted:#8c99a8;--faint:#5c6878;
  --rule:rgba(255,255,255,0.08);--rule2:rgba(255,255,255,0.15);
}
body{font-family:var(--bd);background:var(--bg);color:var(--ink);min-height:100vh;}
a.skipnav{position:absolute;left:-999px;top:4px;z-index:999;padding:8px 16px;background:var(--navy);color:#fff;border-radius:4px;font-size:.82rem;text-decoration:none;}
a.skipnav:focus{left:8px;}
#app{max-width:960px;margin:0 auto;padding:0 1.5rem 5rem;position:relative;}
.hdr{padding:2rem 0 0;}
.hdr h1{font-family:var(--dp);font-size:clamp(1.6rem,4vw,2.1rem);font-weight:700;color:var(--navy);line-height:1.1;}
.hdr .sub{font-size:.69rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:5px;}
.hbar{height:2px;background:linear-gradient(90deg,var(--navy),var(--teal) 40%,var(--rust) 70%,var(--gold));border-radius:2px;margin:1rem 0 1.6rem;}

/* ===== Auth bar ===== */
.authbar{display:flex;align-items:center;justify-content:flex-end;gap:8px;margin-bottom:.6rem;min-height:32px;}
.authbar .uinfo{display:flex;align-items:center;gap:6px;font-size:.76rem;color:var(--navy);}
.authbar .uinfo .vbadge{display:inline-flex;align-items:center;gap:3px;padding:1px 7px;border-radius:20px;background:var(--sage-l);color:var(--sage);font-size:.62rem;font-weight:600;letter-spacing:.04em;}
.authbar .uinfo .vbadge svg{width:10px;height:10px;}
.authbtn{padding:5px 13px;border-radius:6px;border:1px solid var(--rule2);background:var(--card);font-family:var(--bd);font-size:.76rem;font-weight:600;color:var(--navy);cursor:pointer;transition:all .15s;}
.authbtn:hover{background:var(--navy);color:#fff;border-color:var(--navy);}
.authbtn.out{background:transparent;border-color:var(--rule);color:var(--muted);font-weight:500;}
.authbtn.out:hover{color:var(--rust);border-color:var(--rust);}

/* ===== Search ===== */
.sw{display:flex;border:1.5px solid var(--rule2);border-radius:8px;overflow:hidden;background:var(--card);margin-bottom:.4rem;transition:border-color .2s;}
.sw:focus-within{border-color:var(--teal);}
.sw input{flex:1;padding:12px 14px;border:none;font-family:var(--bd);font-size:.9rem;background:transparent;color:var(--ink);outline:none;min-width:0;}
.sw .cc{padding:12px 6px;font-size:.71rem;color:var(--faint);align-self:center;white-space:nowrap;display:none;}
.sw button{padding:12px 20px;background:var(--navy);color:#fff;border:none;font-family:var(--bd);font-size:.83rem;font-weight:600;cursor:pointer;transition:background .2s;white-space:nowrap;}
.sw button:hover{background:var(--teal);}
.sw button:disabled{background:var(--faint);cursor:not-allowed;}
.hint{font-size:.71rem;color:var(--rust);min-height:1rem;margin-bottom:.9rem;display:block;}
.slbl{font-size:.67rem;letter-spacing:.15em;text-transform:uppercase;color:var(--faint);font-weight:600;margin-bottom:.9rem;}

/* ===== Grid cards ===== */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:10px;margin-bottom:2.5rem;}
.cc2{background:var(--card);border-radius:8px;padding:1rem 1.1rem;cursor:pointer;transition:all .18s;border:1px solid var(--rule);}
.cc2:hover,.cc2:focus{transform:translateY(-2px);box-shadow:0 5px 18px rgba(28,43,58,.09);border-color:var(--navy);outline:none;}
.hrow{display:flex;align-items:center;margin-bottom:6px;justify-content:space-between;}
.hrowl{display:flex;align-items:center;}
.hdot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;}
.htxt{font-size:.68rem;color:var(--muted);}
.rdtime{font-size:.6rem;color:var(--faint);}
.hh{background:var(--rust);}.hm{background:var(--gold);}.hl{background:var(--sage);}
.cc2 h3{font-family:var(--dp);font-size:1rem;font-weight:600;color:var(--navy);margin-bottom:4px;line-height:1.2;}
.cc2 p{font-size:.76rem;color:var(--muted);line-height:1.5;}
.ctags{margin-top:7px;display:flex;flex-wrap:wrap;gap:3px;}
.ctag{font-size:.6rem;letter-spacing:.07em;text-transform:uppercase;padding:2px 7px;border-radius:20px;font-weight:600;background:var(--bg);color:var(--muted);}
.ctag-w{background:rgba(154,123,47,.12);color:var(--gold);}

/* ===== Detail view ===== */
.back{background:none;border:none;cursor:pointer;color:var(--muted);font-family:var(--bd);font-size:.81rem;padding:0;margin-bottom:1.4rem;display:flex;align-items:center;gap:5px;transition:color .2s;}
.back:hover{color:var(--navy);}
.mast{background:var(--navy);border-radius:10px;padding:1.6rem 1.8rem;margin-bottom:.9rem;color:#fff;}
.mast h2{font-family:var(--dp);font-size:clamp(1.5rem,3.5vw,2rem);font-weight:700;color:#fff;line-height:1.15;margin-bottom:4px;}
.wbadge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:.62rem;letter-spacing:.09em;text-transform:uppercase;background:rgba(154,123,47,.25);color:#e8c96a;font-weight:600;margin-top:6px;margin-bottom:6px;}
.mmeta{display:flex;align-items:center;gap:11px;flex-wrap:wrap;margin-bottom:1rem;}
.mchip{font-size:.67rem;letter-spacing:.09em;text-transform:uppercase;color:rgba(255,255,255,.5);display:flex;align-items:center;gap:4px;}
.idot{display:inline-block;width:6px;height:6px;border-radius:50%;}
.abar{display:flex;gap:7px;flex-wrap:wrap;}
.ab{display:flex;align-items:center;gap:5px;padding:6px 13px;border-radius:6px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:rgba(255,255,255,.8);font-family:var(--bd);font-size:.76rem;cursor:pointer;transition:all .15s;font-weight:500;}
.ab:hover{background:rgba(255,255,255,.16);color:#fff;}
.ab svg{width:13px;height:13px;flex-shrink:0;}

/* Sensitivity notice */
.sensnote{display:flex;align-items:flex-start;gap:8px;padding:10px 14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:7px;margin-top:10px;font-size:.72rem;color:rgba(255,255,255,.65);line-height:1.5;}
.sensnote svg{width:14px;height:14px;flex-shrink:0;margin-top:1px;opacity:.6;}

/* ===== Sections ===== */
.asec{background:var(--card);border-radius:8px;margin-bottom:12px;border:1px solid var(--rule);overflow:hidden;}
.ash{padding:.88rem 1.1rem;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:background .15s;}
.ash:hover{background:var(--surf);}
.ashl{display:flex;align-items:center;gap:9px;}
.asn{font-size:.62rem;letter-spacing:.1em;color:var(--faint);font-weight:600;text-transform:uppercase;min-width:18px;}
.ash h4{font-family:var(--dp);font-size:.95rem;font-weight:600;color:var(--navy);}


.asbody p{font-size:.86rem;line-height:1.78;color:var(--ink);margin-bottom:.85rem;}
.asbody p:last-child{margin-bottom:0;}

/* Sides grid */
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px;}
.sc{border-radius:7px;padding:.85rem;border:1px solid var(--rule);}
.sc1{background:var(--rust-l);border-color:rgba(181,74,42,.2);}
.sc1 .sn{color:var(--rust);}
.sc2{background:var(--teal-l);border-color:rgba(30,107,114,.2);}
.sc2 .sn{color:var(--teal);}
.sc3{background:var(--sage-l);border-color:rgba(58,107,74,.2);}
.sc3 .sn{color:var(--sage);}
.sc4{background:var(--gold-l);border-color:rgba(154,123,47,.2);}
.sc4 .sn{color:var(--gold);}
.sn{font-family:var(--dp);font-size:.94rem;font-weight:600;margin-bottom:4px;}
.sb{font-size:.79rem;line-height:1.62;color:var(--ink);}
.sf{margin-top:6px;font-size:.68rem;color:var(--muted);}
.cbox{border-left:3px solid var(--teal);background:var(--teal-l);border-radius:0 5px 5px 0;padding:.75rem .9rem;margin-top:.8rem;font-size:.8rem;line-height:1.65;color:var(--ink);}
.cbox strong{color:var(--navy);font-weight:600;}
.cboxv{border-color:var(--sage);background:var(--sage-l);}

/* Key leaders */
.kldr{margin-top:.9rem;border:1px solid var(--rule);border-radius:7px;overflow:hidden;}
.kldr-h{padding:.65rem .9rem;background:var(--surf);font-size:.72rem;font-weight:600;color:var(--navy);letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--rule);display:flex;align-items:center;gap:5px;}
.kldr-h svg{width:12px;height:12px;color:var(--gold);}
.kldr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:0;}
.kldr-item{padding:.7rem .9rem;border-bottom:1px solid var(--rule);border-right:1px solid var(--rule);}
.kldr-item:last-child{border-bottom:none;}
.kldr-name{font-weight:600;font-size:.8rem;color:var(--navy);margin-bottom:2px;}
.kldr-role{font-size:.7rem;color:var(--muted);}
.kldr-stake{font-size:.72rem;color:var(--ink);line-height:1.5;margin-top:3px;}

/* Key dates timeline */
.tline{margin-top:.9rem;border-left:2px solid var(--teal);padding-left:14px;}
.titem{padding:.5rem 0;position:relative;}
.titem::before{content:'';position:absolute;left:-19px;top:.7rem;width:8px;height:8px;border-radius:50%;background:var(--teal);border:2px solid var(--card);}
.tdate{font-size:.66rem;font-weight:600;color:var(--teal);text-transform:uppercase;letter-spacing:.05em;}
.tevent{font-size:.79rem;color:var(--ink);line-height:1.5;margin-top:1px;}

/* Power brokers & lists */
.bl{list-style:none;}
.bi{display:flex;gap:11px;padding:.75rem 0;border-bottom:1px solid var(--rule);}
.bi:last-child{border-bottom:none;}
.brk{font-family:var(--dp);font-size:1.2rem;font-weight:700;color:var(--faint);min-width:24px;line-height:1.1;}
.bn{font-weight:600;font-size:.84rem;color:var(--navy);margin-bottom:2px;}
.bd2{font-size:.77rem;color:var(--muted);line-height:1.5;}
.rl{list-style:none;counter-reset:r;}
.ri{counter-increment:r;padding:.8rem 0 .8rem 1.9rem;border-bottom:1px solid var(--rule);position:relative;}
.ri:last-child{border-bottom:none;}
.ri::before{content:counter(r);position:absolute;left:0;top:.8rem;font-family:var(--dp);font-size:1.05rem;font-weight:700;color:var(--faint);}
.rt{font-weight:600;font-size:.84rem;color:var(--navy);margin-bottom:2px;}
.rd{font-size:.77rem;color:var(--muted);line-height:1.5;}

/* Loading / error */
.loading{text-align:center;padding:3rem 1rem;}
.spin{width:26px;height:26px;border:2px solid var(--rule);border-top-color:var(--teal);border-radius:50%;animation:sp .8s linear infinite;margin:0 auto .9rem;}
@keyframes sp{to{transform:rotate(360deg);}}
.loading p{font-size:.8rem;color:var(--muted);}
.err{padding:1.1rem;background:var(--rust-l);border:1px solid rgba(181,74,42,.2);border-radius:7px;font-size:.82rem;color:var(--rust);margin-bottom:.8rem;}
.nc{padding:1.2rem;background:var(--gold-l);border:1px solid rgba(154,123,47,.2);border-radius:7px;font-size:.83rem;color:var(--gold);margin-bottom:.8rem;}
.retry{margin-left:8px;padding:3px 11px;background:var(--navy);color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:.78rem;font-family:var(--bd);}
.empty{font-size:.82rem;color:var(--muted);padding:.2rem 0;}
.disc{margin-top:.9rem;padding:.75rem 1rem;background:var(--surf);border-radius:5px;font-size:.68rem;color:var(--faint);line-height:1.65;border:1px solid var(--rule);}

/* ===== Comments ===== */
.csec{background:var(--card);border-radius:8px;margin-bottom:7px;border:1px solid var(--rule);overflow:hidden;}
.chd{padding:.88rem 1.1rem;border-bottom:1px solid var(--rule);display:flex;align-items:center;justify-content:space-between;}
.chd h4{font-family:var(--dp);font-size:.95rem;font-weight:600;color:var(--navy);}
.ccnt{font-size:.7rem;color:var(--muted);background:var(--bg);padding:2px 8px;border-radius:20px;}

/* Community guidelines */
.cguidelines{padding:.65rem 1rem;background:var(--surf);border-bottom:1px solid var(--rule);font-size:.68rem;color:var(--muted);line-height:1.6;}
.cguidelines strong{color:var(--navy);font-weight:600;}
.cguidelines ul{margin:.3rem 0 0 1.2rem;list-style:disc;}
.cguidelines ul li{margin-bottom:2px;}

/* Auth gate for comments */
.cauth-gate{padding:1.2rem;text-align:center;}
.cauth-gate p{font-size:.82rem;color:var(--muted);margin-bottom:.7rem;line-height:1.5;}
.cauth-gate .authbtn{padding:8px 20px;font-size:.82rem;}

/* Comment form */
.cform{padding:.9rem;}
.cform textarea{width:100%;border:1px solid var(--rule);border-radius:6px;padding:9px 11px;font-family:var(--bd);font-size:.82rem;color:var(--ink);resize:vertical;min-height:70px;background:var(--surf);outline:none;transition:border-color .2s;}
.cform textarea:focus{border-color:var(--teal);}
.cfmeta{display:flex;gap:6px;margin-top:6px;align-items:center;flex-wrap:wrap;}
.cform select{padding:7px 8px;border:1px solid var(--rule);border-radius:6px;font-family:var(--bd);font-size:.78rem;color:var(--ink);background:var(--surf);outline:none;cursor:pointer;}
.cform select:focus{border-color:var(--teal);}
.csub{padding:7px 14px;background:var(--navy);color:#fff;border:none;border-radius:6px;font-family:var(--bd);font-size:.79rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:background .2s;}
.csub:hover{background:var(--teal);}
.csub:disabled{background:var(--faint);cursor:not-allowed;}
.crem{font-size:.69rem;color:var(--faint);white-space:nowrap;}
.crate{font-size:.66rem;color:var(--rust);margin-left:auto;}
.clist{padding:.2rem 1rem .9rem;}
.ci{padding:.8rem 0;border-bottom:1px solid var(--rule);}
.ci:last-child{border-bottom:none;}
.cimeta{display:flex;align-items:center;gap:7px;margin-bottom:3px;}
.av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.66rem;font-weight:600;flex-shrink:0;color:#fff;}
.cauth-name{font-size:.8rem;font-weight:600;color:var(--navy);}
.cvbadge{display:inline-flex;align-items:center;gap:2px;font-size:.58rem;color:var(--sage);font-weight:600;letter-spacing:.03em;}
.cvbadge svg{width:9px;height:9px;}
.ctime{font-size:.68rem;color:var(--faint);}
.cperspective{font-size:.62rem;padding:1px 6px;border-radius:10px;background:var(--bg);color:var(--muted);font-weight:500;}
.ctxt2{font-size:.8rem;color:var(--ink);line-height:1.58;margin-left:33px;}
.cactions{margin-left:33px;margin-top:4px;display:flex;align-items:center;gap:10px;}
.clk{background:none;border:none;font-size:.68rem;color:var(--muted);cursor:pointer;font-family:var(--bd);padding:0;transition:color .15s;}
.clk:hover,.clk.liked{color:var(--rust);}
.cflag{background:none;border:none;font-size:.64rem;color:var(--faint);cursor:pointer;font-family:var(--bd);padding:0;transition:color .15s;}
.cflag:hover{color:var(--rust);}
.cflag.flagged{color:var(--rust);cursor:default;}
.noc{padding:.8rem 1rem;font-size:.79rem;color:var(--faint);font-style:italic;}

/* ===== Modals ===== */
.ovwrap{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:100;padding:1rem;}
.ovwrap.open{display:flex;}
.modal{background:var(--card);border-radius:10px;padding:1.6rem;max-width:420px;width:100%;max-height:90vh;overflow-y:auto;}
.modal h3{font-family:var(--dp);font-size:1.2rem;font-weight:700;margin-bottom:.5rem;color:var(--navy);}
.modal p{font-size:.81rem;color:var(--muted);margin-bottom:.9rem;line-height:1.6;}
.modal label{display:block;font-size:.79rem;font-weight:600;color:var(--navy);margin-bottom:4px;}
.modal input[type=text],.modal input[type=email],.modal input[type=password]{width:100%;padding:9px 11px;border:1px solid var(--rule);border-radius:6px;font-family:var(--bd);font-size:.82rem;color:var(--ink);background:var(--surf);outline:none;margin-bottom:.7rem;}
.modal input:focus{border-color:var(--teal);}
.modal .mbtn{width:100%;padding:10px;background:var(--navy);color:#fff;border:none;border-radius:6px;font-family:var(--bd);font-size:.83rem;font-weight:600;cursor:pointer;margin-bottom:.5rem;transition:background .15s;}
.modal .mbtn:hover{background:var(--teal);}
.modal .mbtn:disabled{background:var(--faint);cursor:not-allowed;}
.modal .note{font-size:.68rem;color:var(--faint);line-height:1.5;}
.modal .merr{font-size:.74rem;color:var(--rust);margin-bottom:.6rem;min-height:1rem;}
.modal .mok{font-size:.74rem;color:var(--sage);margin-bottom:.6rem;min-height:1rem;}

/* Share modal */
.surl{display:flex;gap:5px;margin-bottom:.4rem;}
.surl input{flex:1;padding:8px 10px;border:1px solid var(--rule);border-radius:6px;font-size:.77rem;color:var(--muted);background:var(--surf);font-family:var(--bd);}
.surl button{padding:8px 12px;background:var(--teal);color:#fff;border:none;border-radius:6px;font-size:.77rem;cursor:pointer;font-family:var(--bd);font-weight:600;}
.toast{font-size:.71rem;color:var(--sage);min-height:1rem;margin-bottom:.4rem;}
.splats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:.9rem;}
.splat{display:flex;align-items:center;gap:6px;padding:9px 12px;border:1px solid var(--rule);border-radius:7px;background:var(--surf);cursor:pointer;font-family:var(--bd);font-size:.79rem;font-weight:500;color:var(--navy);transition:all .15s;}
.splat:hover{background:var(--bg);border-color:var(--teal);}
.splat svg{width:15px;height:15px;flex-shrink:0;}
.mcl{width:100%;padding:9px;background:none;border:1px solid var(--rule);border-radius:6px;font-family:var(--bd);font-size:.8rem;color:var(--muted);cursor:pointer;transition:all .15s;}
.mcl:hover{border-color:var(--navy);color:var(--navy);}

/* Verify steps */
.vsteps{display:flex;gap:6px;margin-bottom:.9rem;}
.vstep{flex:1;text-align:center;padding:8px 4px;border-radius:6px;background:var(--bg);font-size:.7rem;color:var(--faint);font-weight:600;}
.vstep.active{background:var(--navy);color:#fff;}
.vstep.done{background:var(--sage-l);color:var(--sage);}

/* Print */
@media print{
  body{background:#fff;}
  .authbar,.sw,.hint,.slbl,.abar,.csec,.disc,.back,.sensnote,.cguidelines,.ovwrap,.interstitial,.tidbit-feed{display:none!important;}
  .mast{background:#1c2b3a!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .asec{break-inside:avoid;}
  .asbody{display:block!important;border-top:1px solid #ddd!important;}
  .chv{display:none!important;}
  .ash{cursor:default!important;}
  .ash:hover{background:transparent!important;}
  .sc,.kldr-item,.cbox,.cboxv,.titem{break-inside:avoid;}
  .hdot,.idot{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  #hview{display:none!important;}
  #dview{display:block!important;}
}

@media(max-width:420px){.abar{flex-direction:column;}.ab{justify-content:center;}.splats{grid-template-columns:1fr;}.kldr-grid{grid-template-columns:1fr;}}
/* Quick Take */
.qtake{background:var(--card);border-radius:8px;padding:1.1rem 1.3rem;margin-bottom:.9rem;border:1px solid var(--rule);border-left:3px solid var(--teal);}
.qtake-lbl{font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:var(--teal);font-weight:600;margin-bottom:5px;}
.qtake p{font-size:.88rem;line-height:1.75;color:var(--ink);}

/* Pull quote */
.pullq{margin:1rem 0;padding:.8rem 1.2rem;border-left:3px solid var(--gold);font-family:var(--dp);font-size:1.05rem;font-weight:600;color:var(--navy);line-height:1.45;}

/* Interstitial / emotional reset */
.interstitial{text-align:center;padding:1.6rem 1.2rem;margin:.7rem 0;background:linear-gradient(135deg,var(--teal-l),var(--sage-l));border-radius:10px;}
.interstitial h3{font-family:var(--dp);font-size:1.1rem;font-weight:700;color:var(--navy);margin-bottom:5px;}
.interstitial p{font-size:.82rem;color:var(--muted);line-height:1.6;max-width:520px;margin:0 auto;}

/* What You Can Do section */
.action-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-top:.7rem;}
.action-card{background:var(--surf);border:1px solid var(--rule);border-radius:8px;padding:1rem;cursor:default;transition:all .15s;}
.action-card:hover{border-color:var(--teal);background:var(--card);}
.action-icon{font-size:1.3rem;margin-bottom:5px;}
.action-card h5{font-family:var(--dp);font-size:.88rem;font-weight:600;color:var(--navy);margin-bottom:4px;}
.action-card p{font-size:.74rem;color:var(--muted);line-height:1.5;margin-bottom:6px;}
.action-links{list-style:none;}
.action-links li{font-size:.72rem;color:var(--teal);padding:2px 0;}
.action-links li a{color:var(--teal);text-decoration:none;border-bottom:1px dotted var(--teal);}
.action-links li a:hover{color:var(--navy);}

/* Organization cards */
.org-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin-top:.6rem;}
.org-card{background:var(--card);border:1px solid var(--rule);border-radius:7px;padding:.8rem;transition:border-color .15s;}
.org-card:hover{border-color:var(--teal);}
.org-name{font-weight:600;font-size:.8rem;color:var(--navy);margin-bottom:3px;}
.org-what{font-size:.7rem;color:var(--muted);line-height:1.5;margin-bottom:4px;}
.org-tag{display:inline-block;font-size:.58rem;padding:1px 6px;border-radius:10px;background:var(--bg);color:var(--faint);font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
.org-link{display:block;margin-top:5px;font-size:.68rem;color:var(--teal);text-decoration:none;}
.org-link:hover{color:var(--navy);}

.tidbit-feed{margin-bottom:2rem;}
.tidbit-feed-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem;}
.tidbit-feed-lbl{font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:var(--teal);font-weight:600;display:flex;align-items:center;gap:5px;}
.tidbit-feed-lbl svg{width:13px;height:13px;}
.tidbit-feed-nav{display:flex;gap:4px;}
.tidbit-nav-btn{width:28px;height:28px;border-radius:50%;border:1px solid var(--rule);background:var(--card);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:.7rem;padding:0;}

.tidbit-track{overflow:hidden;position:relative;}
.tidbit-scroll{display:flex;gap:10px;transition:transform .4s ease;will-change:transform;}

.tidbit-card{flex:0 0 280px;background:var(--teal-l);border:1px solid rgba(30,107,114,.15);border-radius:8px;padding:.9rem 1rem;cursor:default;transition:border-color .15s;}

.tidbit-topic{font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--teal);font-weight:600;margin-bottom:4px;opacity:.7;}
.tidbit-card p{font-size:.79rem;color:var(--ink);line-height:1.6;margin:0;}

/* Perspective breadth dots */
.persp-dots{display:flex;gap:4px;align-items:center;}
.persp-dot{width:8px;height:8px;border-radius:50%;background:var(--rule);transition:background .3s;}
.persp-dot.filled{background:var(--teal);}

/* Smooth accordion animation */
.asbody{padding:1.15rem;display:none;border-top:1px solid var(--rule);}
.asbody.open{display:block;}

/* Reflective pause */
.pause{text-align:center;padding:.6rem;font-size:.72rem;color:var(--faint);font-style:italic;margin:.5rem 0;}

@media(prefers-reduced-motion:reduce){

}

.src-list{list-style:none;counter-reset:src;}
.src-item{counter-increment:src;padding:.6rem 0 .6rem 2rem;border-bottom:1px solid var(--rule);position:relative;font-size:.79rem;line-height:1.6;}
.src-item:last-child{border-bottom:none;}
.src-item::before{content:counter(src);position:absolute;left:0;top:.6rem;font-family:var(--dp);font-size:.85rem;font-weight:700;color:var(--faint);}

.src-date{font-size:.68rem;color:var(--faint);margin-left:6px;}
.src-link{color:var(--teal);text-decoration:none;border-bottom:1px dotted var(--teal);font-size:.74rem;}
.src-link:hover{color:var(--navy);}
sup.cite{color:var(--teal);cursor:pointer;font-size:.65rem;font-weight:600;padding:0 1px;text-decoration:none;}
sup.cite:hover{color:var(--navy);text-decoration:underline;}

.toc{position:fixed;left:max(8px,calc((100vw - 960px)/2 - 160px));top:50%;transform:translateY(-50%);width:140px;background:var(--card);border:1px solid var(--rule);border-radius:8px;padding:.6rem;box-shadow:0 2px 12px rgba(0,0,0,.06);z-index:50;display:none;}
.toc.visible{display:block;}
.toc-item{display:block;padding:4px 8px;font-size:.68rem;color:var(--muted);border-radius:4px;cursor:pointer;transition:all .15s;border:none;background:none;width:100%;text-align:left;font-family:var(--bd);}
.toc-item:hover{background:var(--surf);color:var(--navy);}
.toc-item.active{background:var(--teal-l);color:var(--teal);font-weight:600;}
.toc-num{font-family:var(--dp);font-weight:700;margin-right:4px;opacity:.5;}

.toc-mob{display:none;position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:50;}
.toc-pill{padding:8px 16px;background:var(--navy);color:#fff;border:none;border-radius:20px;font-family:var(--bd);font-size:.74rem;font-weight:600;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.15);transition:background .15s;}
.toc-pill:hover{background:var(--teal);}
.toc-mob-list{display:none;position:absolute;bottom:44px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--rule);border-radius:8px;padding:.5rem;box-shadow:0 4px 20px rgba(0,0,0,.12);min-width:200px;}

.toc-mob-item:hover{background:var(--surf);}

:root[data-theme="dark"] .mast{background:#2a2e37;}

.theme-toggle{position:absolute;top:1.2rem;right:0;width:36px;height:36px;border-radius:50%;border:1px solid var(--rule2);background:var(--card);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .15s;z-index:10;}

.cw-bar{display:flex;align-items:center;gap:8px;padding:.65rem 1rem;background:var(--surf);border:1px solid var(--rule);border-radius:8px;margin-bottom:.7rem;font-size:.76rem;color:var(--muted);}

.cw-toggle::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s;}

.cw-blur.blurred .asbody{filter:blur(5px);user-select:none;pointer-events:none;}

.dg-warn{margin-top:1rem;padding:.7rem .9rem;background:var(--gold-l);border:1px solid rgba(154,123,47,.2);border-radius:6px;font-size:.76rem;color:var(--ink);line-height:1.6;}

.export-fmt{font-size:.82rem;font-weight:600;color:var(--navy);}
.export-desc{font-size:.64rem;color:var(--faint);}

  .theme-toggle{display:none!important;}
  .cw-bar{display:none!important;}
}

@media print{.toc,.toc-mob{display:none!important;}}

  'abortion': {
    title:'Abortion Rights', isWedge:true, intensity:'high', region:'United States', sensitivity:'This topic involves deeply personal medical decisions, bodily autonomy, and sincerely held moral and religious beliefs. All perspectives are presented respectfully.', lastVerified:'March 2026',
    sources:[
      {id:1,text:'Dobbs decision and its impact on abortion access',org:'BBC News',url:'https://www.bbc.com/news/world-us-canada',date:'2024'},
      {id:2,text:'US Abortion Restrictions Tracker and State Laws',org:'Guttmacher Institute',url:'https://www.guttmacher.org/state-policy/explore/abortion-policy-state',date:'2024'},
      {id:3,text:'The State of Abortion Access After Dobbs',org:'Reuters',url:'https://www.reuters.com/',date:'2024'},
      {id:4,text:'Americans\' Views on Abortion',org:'Pew Research Center',url:'https://www.pewresearch.org/religion/2024/04/17/americans-and-abortion/',date:'2024'},
      {id:5,text:'Abortion Policy and Practice',org:'National Women\'s Law Center',url:'https://nwlc.org/',date:'2024'},
      {id:6,text:'The Road to Dobbs: How the Supreme Court Overturned Roe',org:'AP News',url:'https://apnews.com/',date:'2024'},
      {id:7,text:'Post-Dobbs Abortion Access and Ballot Initiatives',org:'Council on Foreign Relations',url:'https://www.cfr.org/',date:'2024'},
      {id:8,text:'Reproductive Freedom and International Context',org:'Center for Reproductive Rights',url:'https://reproductiverights.org/',date:'2024'}
    ],
    keyDates:[
      {date:'1973',event:'Roe v. Wade establishes constitutional right to abortion'},
      {date:'1992',event:'Planned Parenthood v. Casey upholds Roe but allows more restrictions'},
      {date:'2016',event:'Whole Woman\'s Health v. Hellerstedt strikes down Texas restrictions'},
      {date:'Jun 2022',event:'Dobbs v. Jackson overturns Roe v. Wade'},
      {date:'2022-23',event:'Ballot initiatives on abortion in Kansas, Ohio, Michigan, and other states'},
      {date:'2024',event:'Ongoing litigation over mifepristone access and interstate travel'},
    ],
    situation:"The debate over abortion in the United States underwent a seismic shift in June 2022 when the Supreme Court overturned Roe v. Wade in the Dobbs v. Jackson decision, ending nearly 50 years of federal constitutional protection for abortion access. The ruling returned the question of abortion legality to individual states.\nSince the Dobbs decision, a patchwork of state laws has emerged. Roughly half of US states have banned or severely restricted abortion, while others have moved to enshrine abortion protections in state constitutions. This has created dramatic disparities in access based on geography and economic resources.\nThe issue remains one of the most politically charged topics in American life, affecting elections at every level of government. Public opinion polls consistently show a majority of Americans support at least some access to abortion, but deep divisions remain over timing, exceptions, and the fundamental moral questions involved.",
    sides:[
      {name:'Pro-choice / Abortion rights',coreBeliefs:'Bodily autonomy is a fundamental right. Abortion decisions should be between a patient and their doctor. Restricting abortion disproportionately harms low-income women and minorities. Access to safe abortion is a public health matter.',keyFigures:'Planned Parenthood, ACLU, reproductive rights organizations, many Democratic legislators',c:'sc1'},
      {name:'Pro-life / Anti-abortion',coreBeliefs:'Life begins at conception and deserves legal protection. Abortion is morally equivalent to taking a human life. Society has an obligation to protect the unborn. Alternatives like adoption should be promoted.',keyFigures:'National Right to Life Committee, Susan B. Anthony Pro-Life America, many Republican legislators, Catholic and evangelical organizations',c:'sc2'},
      {name:'Moderate / Conditional positions',coreBeliefs:'Abortion should be legal but with reasonable limits based on gestational age. Exceptions for rape, incest, and life of the mother are essential. Reducing the need for abortion through contraception and support is preferable.',keyFigures:'Various centrist organizations, many independent voters, some religious leaders',c:'sc3'}
    ],
    importantDistinction:'The debate is often framed as binary, but most Americans hold nuanced views that do not fit neatly into "pro-choice" or "pro-life" labels. Many people who personally oppose abortion also oppose government bans, and many who support access also support some gestational limits.',
    missingVoices:'Women in rural and low-income communities facing the greatest practical barriers, people with devastating prenatal diagnoses, healthcare providers navigating legal uncertainty, and men who are affected but rarely centered in conversation.',
    powerBrokers:[
      {name:'US Supreme Court',description:'The Dobbs decision reshaped the legal landscape. Future cases on medication abortion, interstate travel, and federal regulations will continue to shape the issue.'},
      {name:'State legislatures',description:'Now the primary battleground for abortion policy. Trigger laws, constitutional amendments, and ballot initiatives are active in dozens of states.'},
      {name:'Pharmaceutical companies',description:'Manufacturers of mifepristone are at the center of legal battles over FDA authority and mail-order access.'},
      {name:'Religious institutions',description:'Catholic, evangelical, and other organizations provide significant infrastructure on the anti-abortion side, while progressive faith groups advocate for access.'}
    ],
    gameTheory:"The post-Dobbs landscape creates a classic federalism dilemma. States with bans create pressure on neighboring states that maintain access, while states with protections attract patients from restrictive states, creating resource and political strains. This dynamic incentivizes further polarization rather than compromise.\nElectorally, abortion has become a powerful motivating issue for voters on both sides. Ballot initiatives on abortion have consistently outperformed expectations in favor of access, even in conservative-leaning states, suggesting a gap between legislative action and public opinion that creates ongoing political instability.",
    keyLeaders:[
      {name:'Justice Samuel Alito',role:'Author of the Dobbs decision',stake:'Authored the majority opinion overturning Roe. His judicial philosophy of returning issues to democratic processes shapes the legal battlefield.'},
      {name:'State governors',role:'Executive enforcement across 50 states',stake:'Governors in states like Texas, Florida, California, and New York are key players in setting enforcement tone and signing new legislation.'},
      {name:'Marjorie Dannenfelser',role:'President of SBA Pro-Life America',stake:'Leading national advocate for federal abortion restrictions and a key strategist for the pro-life movement\'s post-Dobbs agenda.'},
      {name:'Alexis McGill Johnson',role:'President of Planned Parenthood',stake:'Leads the largest reproductive health provider in the US. Drives legal challenges and state-level campaigns to protect access.'},
      {name:'Key swing-state legislators',role:'State legislators in purple states',stake:'Their votes determine whether states become restrictive or protective, often facing intense pressure from both sides.'},
    ],
    resolutionPaths:[
      {title:'Federal legislation',description:'Congress could pass a law either protecting or restricting abortion nationwide, though this would require overcoming the filibuster and deep partisan divides.'},
      {title:'State-by-state democratic process',description:'Continued use of ballot initiatives and state constitutional amendments to let voters in each state decide directly.'},
      {title:'Gestational framework compromise',description:'A middle-ground establishing broad access in the first trimester, state regulation in the second, and restriction in the third with medical exceptions — similar to many European countries.'},
      {title:'Reducing demand through support',description:'Investing in contraception access, sex education, prenatal care, parental leave, and adoption support to reduce unintended pregnancies.'}
    ],
    historicalPrecedent:'Ireland held a referendum in 2018 that repealed its constitutional abortion ban by a two-thirds majority, demonstrating that even deeply Catholic societies can reach democratic resolution. Germany and France have found legislative compromises allowing access with counseling requirements and gestational limits.'
 ,
    quickTake:"Americans are deeply divided over when life begins, who decides, and what role government should play. Since 2022, abortion access varies dramatically by state. Most people hold nuanced views that don't fit neatly into either camp.",
    pullQuote:"Ballot initiatives on abortion have consistently outperformed expectations in favor of access, even in conservative-leaning states.",
    didYouKnow:"Ireland, one of the most Catholic countries in Europe, voted to legalize abortion by a two-thirds majority in 2018.",
    discussionGuide:{
      ageNote:"Recommended for ages 14+",
      starters:["What do you think is the most important question in the abortion debate — and has that changed for you as you've learned more?","Some people say this is a question for individuals, others say it's a question for society. What makes sense to you?","If someone you care about had a different view than you on abortion, how would you respond?"],
      values:"What values are in tension here — autonomy, life, responsibility, faith, health, rights? Can you see how someone might weight these differently and still be thoughtful and moral?",
      redFlags:"Watch for: calling people murderers or claiming they don't care about women. Using extreme examples as if they're typical. Refusing to acknowledge the genuine moral difficulty on the other side. If you feel defensive, that's okay — name it.",
      activity:"Interview people across the spectrum on the one thing that shapes their view most: religious faith, personal experience, philosophical commitments, medical knowledge. Understand what actually drives their position rather than assuming."
    },
    organizations:[{"name": "Guttmacher Institute", "what": "Nonpartisan reproductive health research. Data cited by both sides of the debate.", "tag": "Research", "url": "https://www.guttmacher.org"}, {"name": "National Women's Law Center", "what": "Legal advocacy for women's rights including reproductive healthcare access.", "tag": "Legal", "url": "https://nwlc.org"}, {"name": "Birthright International", "what": "Provides non-judgmental support to pregnant women considering all options.", "tag": "Support", "url": "https://birthright.org"}],
    actions:[{"icon": "\ud83d\udcd6", "title": "Understand deeper", "desc": "Explore research from nonpartisan sources.", "links": [{"text": "Guttmacher Institute data", "url": "https://www.guttmacher.org"}, {"text": "Pew Research Center polling", "url": "https://www.pewresearch.org"}]}, {"icon": "\ud83d\uddf3\ufe0f", "title": "Know your state's laws", "desc": "Understand what's legal where you live.", "links": [{"text": "Center for Reproductive Rights map", "url": "https://reproductiverights.org"}, {"text": "Track state legislation", "url": "https://www.guttmacher.org/state-policy"}]}, {"icon": "\ud83e\udd1d", "title": "Support people navigating this", "desc": "Organizations helping regardless of choice.", "links": [{"text": "National Abortion Federation hotline", "url": "https://prochoice.org"}, {"text": "Birthright (pregnancy support)", "url": "https://birthright.org"}]}, {"icon": "\ud83d\udce2", "title": "Engage in dialogue", "desc": "Have respectful conversations across divides.", "links": [{"text": "Braver Angels workshops", "url": "https://braverangels.org"}, {"text": "Share this analysis", "url": "#"}]}] },

  'ukraine-russia': {
    title:'Ukraine & Russia', isWedge:false, intensity:'high', region:'Europe', sensitivity:'This topic involves an active war with massive civilian casualties and displacement. Content is presented for educational understanding.', lastVerified:'March 2026',
    sources:[
      {id:1,text:'Russia-Ukraine war: Maps and tracking the conflict',org:'BBC News',url:'https://www.bbc.com/news/world-europe-60506682',date:'2024'},
      {id:2,text:'War in Ukraine: Casualty estimates, military capabilities, and analysis',org:'Institute for the Study of War',url:'https://www.understandingwar.org/',date:'2024'},
      {id:3,text:'Ukraine Invasion: Timeline, context, and implications',org:'Reuters',url:'https://www.reuters.com/world/europe/',date:'2024'},
      {id:4,text:'Russia-Ukraine Conflict: European Security Implications',org:'Council on Foreign Relations',url:'https://www.cfr.org/ukraine/',date:'2024'},
      {id:5,text:'Crisis in Ukraine: International Response and Humanitarian Aid',org:'International Crisis Group',url:'https://www.crisisgroup.org/europe/ukraine-conflict',date:'2024'},
      {id:6,text:'World divided over Ukraine war support',org:'Pew Research Center',url:'https://www.pewresearch.org/',date:'2024'},
      {id:7,text:'NATO expansion and European security architecture',org:'AP News',url:'https://apnews.com/',date:'2024'},
      {id:8,text:'Refugee crisis and displacement in Europe',org:'UNHCR',url:'https://www.unhcr.org/ukraine-emergency',date:'2024'}
    ],
    keyDates:[
      {date:'2014',event:'Russia annexes Crimea; conflict begins in eastern Ukraine\'s Donbas region'},
      {date:'2015',event:'Minsk II ceasefire agreement signed but never fully implemented'},
      {date:'Feb 2022',event:'Russia launches full-scale invasion of Ukraine'},
      {date:'Sep 2022',event:'Ukraine recaptures Kharkiv region in successful counteroffensive'},
      {date:'2023',event:'Finland and Sweden join NATO; Ukraine launches summer counteroffensive'},
      {date:'2024-25',event:'War continues as grinding attrition; diplomatic efforts intensify'},
    ],
    situation:"Russia launched a full-scale invasion of Ukraine in February 2022, marking the largest conventional military conflict in Europe since World War II. The invasion followed years of escalating tensions, including Russia's annexation of Crimea in 2014 and its support for separatist forces in eastern Ukraine's Donbas region.\nUkraine has mounted a determined defense supported by extensive Western military and economic aid. The conflict has settled into a grinding war of attrition, with both sides suffering enormous casualties. Major Ukrainian cities have endured sustained bombardment, millions of civilians have been displaced, and documented war crimes have been reported.\nThe war has reshaped European security architecture, prompting Finland and Sweden to join NATO, massive increases in European defense spending, and unprecedented economic sanctions against Russia. It has also disrupted global energy and food markets.",
    sides:[
      {name:'Ukraine',coreBeliefs:'National sovereignty and territorial integrity are non-negotiable. Ukraine has the right to choose its own alliances, including NATO and EU membership. Russian aggression is an existential threat. Full liberation of occupied territories is the goal.',keyFigures:'Volodymyr Zelensky, Ukrainian military leadership, civil society organizations',c:'sc1'},
      {name:'Russia',coreBeliefs:'NATO expansion poses an existential threat to Russian security. Ukraine is part of Russia\'s historical sphere of influence. Russian-speaking populations need protection. Western intervention in former Soviet states is destabilizing.',keyFigures:'Vladimir Putin, Russian military and security establishment, state media',c:'sc2'},
      {name:'Western allies',coreBeliefs:'The rules-based international order must be defended. Allowing territorial conquest by force sets a dangerous precedent. Supporting Ukraine is essential for European security.',keyFigures:'NATO leadership, EU officials, US administration, UK government',c:'sc3'},
      {name:'Global South / Non-aligned',coreBeliefs:'Both sides bear responsibility for escalation. Western sanctions harm developing countries disproportionately. Pragmatic diplomacy rather than confrontation is needed.',keyFigures:'India, Brazil, South Africa, various African and Asian nations, Turkey',c:'sc4'}
    ],
    importantDistinction:'There is a meaningful distinction between Russian government policy and the Russian people, many of whom oppose the war at significant personal risk. Similarly, Ukrainian society, while united against the invasion, contains diverse views on the path forward.',
    missingVoices:'Russian anti-war dissidents facing imprisonment, Ukrainian civilians in occupied territories, soldiers on both sides dealing with the human cost, and Global South populations bearing economic consequences without any voice in resolution.',
    powerBrokers:[
      {name:'United States',description:'Largest provider of military aid to Ukraine and driving force behind Western sanctions. American domestic politics significantly influence the scale and duration of support.'},
      {name:'European Union',description:'Provides substantial economic aid and sweeping sanctions. European energy dependence on Russia has been a key vulnerability being rapidly addressed.'},
      {name:'China',description:'Maintains strategic partnership with Russia while calling for peace. Its economic leverage over Russia grows as sanctions push Russia toward Chinese dependence.'},
      {name:'Turkey',description:'NATO member maintaining relations with both sides, brokered the Black Sea grain deal, and sold drones to Ukraine. Unique potential mediator.'}
    ],
    gameTheory:"The war presents a classic escalation dilemma. Each side fears that concessions will be interpreted as weakness, encouraging further aggression. Russia faces sunk-cost pressures to justify enormous losses, while Ukraine fears that territorial concessions reward aggression and invite future attacks.\nNuclear deterrence adds another layer: Russia's nuclear arsenal creates a ceiling on Western involvement while also providing a floor of deterrence against regime-threatening escalation. This creates a paradox where both sides have incentives to fight a prolonged conventional war rather than risk either capitulation or nuclear escalation.",
    keyLeaders:[
      {name:'Volodymyr Zelensky',role:'President of Ukraine',stake:'Transformed from political outsider to wartime leader. His personal credibility is central to maintaining Western support and Ukrainian morale.'},
      {name:'Vladimir Putin',role:'President of Russia',stake:'Has staked his legacy and Russia\'s great-power status on the war. Faces the dilemma of escalation risks versus the political cost of acknowledging failure.'},
      {name:'US President',role:'Leader of Ukraine\'s primary backer',stake:'Balances supporting Ukraine against risks of escalation with a nuclear power, while managing domestic political pressures on spending.'},
      {name:'Olaf Scholz',role:'Chancellor of Germany',stake:'Leads Europe\'s largest economy through a historic shift from engagement with Russia to security-focused policy. Balances allied solidarity with German economic interests.'},
      {name:'Xi Jinping',role:'President of China',stake:'Uses the conflict to deepen Russia\'s dependence on China while avoiding direct involvement that would trigger Western sanctions.'},
      {name:'Recep Tayyip Erdogan',role:'President of Turkey',stake:'Leverages Turkey\'s unique position as NATO member with Russian ties to mediate, while pursuing Turkish strategic interests in the Black Sea region.'},
    ],
    resolutionPaths:[
      {title:'Negotiated ceasefire with security guarantees',description:'A ceasefire along current lines with international security guarantees for Ukraine and a framework for eventual status negotiations on occupied territories.'},
      {title:'Ukrainian military victory',description:'Ukraine reclaims occupied territory through force, potentially combined with Russian internal political change. Risks significant escalation.'},
      {title:'Frozen conflict',description:'Fighting winds down into stalemate without formal resolution, similar to Korea. Unstable but potentially the most likely near-term outcome.'},
      {title:'Comprehensive European security framework',description:'Broader negotiation addressing NATO-Russia relations, arms control, and a new European security architecture. Most ambitious but most potentially durable.'}
    ],
    historicalPrecedent:'The Korean War offers a parallel: a large-scale invasion repelled but never formally resolved, resulting in a divided peninsula with a heavily fortified DMZ. The Helsinki Accords of 1975, which managed Cold War tensions through mutual commitments on borders and human rights, offer a more hopeful model.'
 ,
    quickTake:"Russia invaded Ukraine in 2022, triggering Europe's largest war since WWII. Ukraine is fighting to survive as a nation; Russia claims security concerns. The conflict has reshaped global alliances, energy markets, and the rules of international order.",
    pullQuote:"Both sides have incentives to fight a prolonged conventional war rather than risk either capitulation or nuclear escalation.",
    didYouKnow:"Finland's border with Russia is 1,340 km long \u2014 it joined NATO in 2023 after decades of neutrality, directly because of the invasion.",
    discussionGuide:{
      ageNote:"Recommended for ages 14+",
      starters:["What do you think Ukraine should prioritize right now — reclaiming all its territory, protecting its people, or something else?","Russia says it invaded for security reasons. Do you think that's genuine, a justification for something else, or both?","How do you think the rest of the world should respond — with weapons, diplomacy, sanctions, or something different?"],
      values:"What values matter most in a war situation — sovereignty, human life, preventing escalation, justice? How do countries balance these?",
      redFlags:"Watch for: assuming either side is completely right or wrong. Treating propaganda as fact without checking sources. Using war to justify violence or aggression elsewhere. Step back if conversations become about who's winning a debate rather than understanding the conflict.",
      activity:"Find Ukrainian and Russian news coverage of the same event. What's emphasized differently? What's left out? Discuss why each side might frame it that way without assuming dishonesty."
    },
    organizations:[{"name": "International Rescue Committee", "what": "Provides emergency aid to Ukrainian refugees and displaced families.", "tag": "Humanitarian", "url": "https://www.rescue.org"}, {"name": "UNHCR", "what": "UN refugee agency supporting the 6+ million Ukrainians displaced across Europe.", "tag": "Aid", "url": "https://www.unhcr.org"}, {"name": "International Crisis Group", "what": "Independent analysis of the conflict and prospects for resolution.", "tag": "Research", "url": "https://www.crisisgroup.org"}],
    actions:[{"icon": "\ud83d\udcd6", "title": "Understand deeper", "desc": "Follow expert analysis beyond daily news.", "links": [{"text": "International Crisis Group updates", "url": "https://www.crisisgroup.org"}, {"text": "Institute for the Study of War", "url": "https://www.understandingwar.org"}]}, {"icon": "\ud83e\udd1d", "title": "Support people affected", "desc": "Millions of Ukrainians need ongoing support.", "links": [{"text": "UNHCR Ukraine emergency", "url": "https://www.unhcr.org"}, {"text": "International Rescue Committee", "url": "https://www.rescue.org"}]}, {"icon": "\ud83d\udce2", "title": "Amplify understanding", "desc": "Help others see past propaganda on all sides.", "links": [{"text": "Share this analysis", "url": "#"}, {"text": "Support independent journalism", "url": "#"}]}, {"icon": "\ud83d\uddf3\ufe0f", "title": "Engage your representatives", "desc": "Foreign policy is shaped by constituent pressure.", "links": [{"text": "Find your US representatives", "url": "https://www.congress.gov/members/find-your-member"}, {"text": "Track aid legislation", "url": "#"}]}] },

  'sunni-shia': {
    title:'Sunni-Shia Divide', isWedge:false, intensity:'medium', region:'Middle East & Global Islam', sensitivity:'This topic involves deeply held religious beliefs. All traditions are presented with respect and academic neutrality.', lastVerified:'March 2026',
    sources:[
      {id:1,text:'Sunni-Shia divide: History, theology, and modern geopolitics',org:'BBC Religions',url:'https://www.bbc.co.uk/religion/religions/islam/',date:'2024'},
      {id:2,text:'Iran and Saudi Arabia rivalry driving sectarian tensions',org:'Council on Foreign Relations',url:'https://www.cfr.org/middle-east',date:'2024'},
      {id:3,text:'The Saudi-Iranian Rapprochement and Regional Implications',org:'International Crisis Group',url:'https://www.crisisgroup.org/middle-east-north-africa',date:'2024'},
      {id:4,text:'Understanding sectarian conflict in Iraq, Syria, Yemen',org:'Reuters',url:'https://www.reuters.com/world/middle-east/',date:'2024'},
      {id:5,text:'Interfaith dialogue and bridge-building initiatives',org:'Religions for Peace',url:'https://www.rfp.org/',date:'2024'},
      {id:6,text:'Islamic theological traditions and scholarly perspectives',org:'Al-Azhar University',url:'https://www.alazhar.gov.eg/',date:'2024'},
      {id:7,text:'Sunni Islam and global Muslim networks',org:'AP News',url:'https://apnews.com/',date:'2024'}
    ],
    keyDates:[
      {date:'632 CE',event:'Death of Prophet Muhammad; succession dispute begins'},
      {date:'680 CE',event:'Battle of Karbala; martyrdom of Husayn ibn Ali'},
      {date:'1501',event:'Safavid dynasty establishes Shia Islam as state religion of Iran'},
      {date:'1979',event:'Iranian Revolution establishes Islamic Republic'},
      {date:'2003',event:'US invasion of Iraq shifts power toward Shia majority'},
      {date:'2023',event:'Saudi-Iranian rapprochement brokered by China'},
    ],
    situation:"The Sunni-Shia divide represents the oldest and most significant schism within Islam, originating in a 7th-century dispute over the rightful succession to the Prophet Muhammad. What began as a political disagreement evolved over centuries into distinct theological traditions, legal schools, and cultural identities.\nToday, approximately 85-90% of the world's 1.8 billion Muslims identify as Sunni, while 10-15% are Shia. The divide has been instrumentalized by modern states, particularly through the rivalry between Sunni-majority Saudi Arabia and Shia-majority Iran, turning theological differences into geopolitical proxy conflicts.\nSectarian tensions have fueled conflicts in Iraq, Syria, Yemen, Lebanon, and Bahrain. However, the vast majority of Sunni-Shia interactions globally are peaceful, and many Muslim-majority countries have significant minority populations that coexist with relatively little friction.",
    sides:[
      {name:'Sunni tradition',coreBeliefs:'The first four caliphs were all legitimate successors. Religious authority derives from scholarly consensus and hadith traditions. The community (ummah) collectively guides the faith.',keyFigures:'Al-Azhar University scholars, Saudi religious establishment, various national authorities',c:'sc1'},
      {name:'Shia tradition',coreBeliefs:'Ali ibn Abi Talib was the rightful successor to Muhammad. The Imams descended from Ali carry special authority. The concept of the Imamate is central. Emphasis on the martyrdom of Husayn at Karbala.',keyFigures:'Iranian Supreme Leader, Iraqi Grand Ayatollahs in Najaf, Hezbollah leadership',c:'sc2'},
      {name:'Intra-Islamic unity advocates',coreBeliefs:'Shared foundations of Islam far outweigh differences. Political manipulation by governments is the real enemy. Interfaith dialogue can bridge divides. Historical grievances should not define modern relationships.',keyFigures:'Interfaith organizations, moderate scholars from both traditions, Sufi orders',c:'sc3'}
    ],
    importantDistinction:'The divide is far more complex than a simple binary. Within Sunni Islam, there are four major legal schools. Within Shia Islam, there are Twelvers, Ismailis, Zaidis, and others. Many conflicts labeled "sectarian" are primarily about political power and resources.',
    missingVoices:'Ordinary Muslims who don\'t identify strongly with sectarian labels, Sufi communities that transcend the divide, minority sects like Ibadis, Alawites, and Druze, and secular citizens who view the divide as politically manufactured.',
    powerBrokers:[
      {name:'Saudi Arabia',description:'Self-appointed guardian of Sunni Islam and home to Mecca and Medina. Has invested billions promoting its interpretation of Sunni Islam worldwide.'},
      {name:'Iran',description:'Most powerful Shia-majority state. Projects influence through allied movements in Lebanon, Iraq, Syria, and Yemen.'},
      {name:'Iraq',description:'Home to Shia Islam\'s holiest sites in Najaf and Karbala. Its post-2003 political system has been a flash point for sectarian tensions.'},
      {name:'Religious scholars',description:'Al-Azhar in Cairo (Sunni) and the seminary in Qom (Shia) wield enormous influence over interpretation and public opinion.'}
    ],
    gameTheory:"The Saudi-Iranian rivalry has transformed the theological divide into a geopolitical zero-sum game. Each power views the other's influence as a direct threat, creating proxy competitions in weak states that exacerbate local conflicts and harden sectarian identities.\nHowever, the 2023 Saudi-Iranian rapprochement brokered by China suggests both states recognize the costs of unlimited competition. The challenge is translating diplomatic moves into reduced sectarian mobilization on the ground.",
    keyLeaders:[
      {name:'Mohammed bin Salman',role:'Crown Prince of Saudi Arabia',stake:'Pursuing modernization that requires regional stability. The rapprochement with Iran serves his Vision 2030 economic agenda.'},
      {name:'Ayatollah Khamenei',role:'Supreme Leader of Iran',stake:'Leads the most powerful Shia state. His decisions on proxy engagement set the tone for sectarian dynamics across the region.'},
      {name:'Grand Ayatollah al-Sistani',role:'Senior Shia cleric in Najaf, Iraq',stake:'The most respected Shia religious authority. His calls for restraint and coexistence carry immense weight.'},
      {name:'Sheikh Ahmed al-Tayeb',role:'Grand Imam of Al-Azhar',stake:'Leads Sunni Islam\'s most prestigious institution. His engagement in interfaith dialogue shapes the framework for coexistence.'},
    ],
    resolutionPaths:[
      {title:'Scholarly dialogue and bridge-building',description:'Sustained engagement between Sunni and Shia authorities to emphasize shared foundations and develop mutual recognition frameworks.'},
      {title:'Saudi-Iranian detente',description:'Continued normalization reducing incentives for sectarian proxy competition and creating space for local reconciliation.'},
      {title:'Civic nationalism over sectarian identity',description:'Strengthening national institutions so citizenship rather than sect becomes the primary political organizing principle.'},
      {title:'Education reform',description:'Updating religious curricula to teach the full diversity of Islamic tradition with respect rather than framing other sects as heretical.'}
    ],
    historicalPrecedent:'The Catholic-Protestant divide offers a loose parallel. Centuries of violent conflict gradually gave way to coexistence through the Peace of Westphalia, the Enlightenment, and eventually the ecumenical movement. The process took centuries and required both political and theological evolution.'
 ,
    quickTake:"Islam's oldest divide began as a succession dispute in 632 CE and has evolved into distinct theological traditions. Today, Saudi Arabia and Iran have turned it into a geopolitical rivalry, but the vast majority of Sunni-Shia interactions worldwide are peaceful.",
    pullQuote:"Many conflicts labeled as 'sectarian' are primarily about political power, resources, and territorial control.",
    didYouKnow:"Grand Ayatollah al-Sistani, the most revered Shia cleric, has consistently called for coexistence and restraint \u2014 his words can move millions.",
    discussionGuide:{
      ageNote:"Recommended for ages 14+",
      starters:["What role should religion play in politics? Is that different for Sunni vs. Shia Islam?","If you met someone from the other tradition, would you be able to tell? What does that say about how real this divide is?","Saudi Arabia and Iran used to be enemies but signed a peace agreement. What changed?"],

      activity:"Research a country with both Sunni and Shia populations (Iraq, Lebanon, etc.). Map who has power, what the tensions are, and what's being competed over. Is it really theology or something else?"
